<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมวดหมู่หนังสือ - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { 
            /* ใช้โทนสีเดียวกับหน้า Terms ที่พี่ให้มา */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #fff; margin: 30px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 900px; 
            width: 100%;
        }
        
        .cat-card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 40px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: none; 
            font-weight: 600; 
            color: #4a148c; /* สีม่วงเข้ม */
            font-size: 18px;
            text-align: center;
        }
        
        .cat-card:hover { 
            background: #fff; 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            color: #667eea;
        }

        /* เพิ่มไอคอนเล็กๆ หน้าชื่อหมวด (ถ้าต้องการ) */
        .cat-card::before {
            content: "📖";
            display: block;
            font-size: 30px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>📚 หอสมุดส่วนตัว</h1>
    <div class="grid">
        <div class="cat-card" onclick="location.href='register.html?cat=1_PetchPraUma&name=เพชรพระอุมา'">เพชรพระอุมา</div>
        <div class="cat-card" onclick="location.href='register.html?cat=2_Thai_Novel&name=นิยายไทย'">นิยายไทย</div>
        <div class="cat-card" onclick="location.href='register.html?cat=3_English_Translated&name=นิยายแปล'">นิยายแปล</div>
        <div class="cat-card" onclick="location.href='register.html?cat=4_Chinese_Novel&name=นิยายจีน'">นิยายจีน</div>
        <div class="cat-card" onclick="location.href='register.html?cat=5_HowTo&name=How-to'">How-to</div>
        <div class="cat-card" onclick="location.href='register.html?cat=6_Wait&name=หมวดรอแยก'">หมวดรอแยก</div>
    </div>
</body>
</html>
