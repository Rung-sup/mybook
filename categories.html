<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หมวดหมู่ - My Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

    body {
      margin: 0;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      color: #d4af37;
      margin-bottom: 30px;
      font-weight: 600;
      text-align: center;
      line-height: 1.4;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      width: 100%;
      max-width: 420px;
    }

    .cat-card {
      padding: 22px;
      border-radius: 15px;
      text-align: center;
      text-decoration: none;
      font-size: 19px;
      font-weight: 500;
      transition: 0.3s;
      border: 2px solid transparent;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      user-select: none;
    }

    .cat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(212, 175, 87, 0.2);
    }

    .cat-petch {
      background: #2d472d;
      color: #d4af37;
      border-color: #d4af37;
    }

    .cat-thai {
      background: #3d2b1f;
      color: #e6ccb2;
    }

    .cat-translate {
      background: #2c3e50;
      color: #ecf0f1;
    }

    .cat-china {
      background: #800000;
      color: #ffd700;
      border-color: #ffd700;
    }

    .cat-howto {
      background: #ffffff;
      color: #333;
    }

    .cat-pending {
      background: #444;
      color: #bbb;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>คลังหนังสือของคุณรันนรา</h1>

  <div class="category-grid">
    <div class="cat-card cat-petch" onclick="goToArchive('1_PetchPraUma', 'เพชรพระอุมา', 'forest')">
      💎 เพชรพระอุมา
    </div>

    <div class="cat-card cat-thai" onclick="goToArchive('2_ThaiNovel', 'นิยายไทย', 'classic')">
      📖 นิยายไทย
    </div>

    <div class="cat-card cat-translate" onclick="goToArchive('3_English_Translated', 'นิยายแปล', 'classic')">
      🌐 นิยายแปล
    </div>

    <div class="cat-card cat-china" onclick="goToArchive('4_Chinese_Novel', 'นิยายจีน', 'china')">
      🐉 นิยายจีน
    </div>

    <div class="cat-card cat-howto" onclick="goToArchive('5HowToReligionScience', 'วิชาการ & How-to', 'classic')">
      💡 วิชาการ & How-to
    </div>

    <div class="cat-card cat-pending" onclick="goToArchive('6PendingSort', 'รอคัดแยก', 'classic')">
      📂 รอคัดแยก (ไฟล์อื่นๆ)
    </div>
  </div>

  <script>
    function goToArchive(catKey, name, theme) {
      const url = `smart-archive.html?cat=${encodeURIComponent(catKey)}&name=${encodeURIComponent(name)}&theme=${encodeURIComponent(theme)}`;
      window.location.href = url;
    }
  </script>
</body>
</html>
