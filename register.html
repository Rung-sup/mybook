<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือคุณรันนรา</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; min-height: 100vh; }
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; background: #fff; display: flex; align-items: center; justify-content: space-between; }
        .btn-back { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 6px 15px; border-radius: 20px; cursor: pointer; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; text-align: center; }
        .book-card:hover { transform: scale(1.03); }
        .book-cover { width: 100%; height: 180px; object-fit: cover; background: #5d4037; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; padding: 10px; }
        .book-info { padding: 10px; font-size: 12px; font-weight: 500; color: #333; }
        #reader-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .reader-header { background: #111; color: #fff; padding: 10px; display: flex; justify-content: space-between; }
        #pdf-canvas { max-width: 100%; height: auto; margin: auto; }
        .nav-controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #d4af37; border: 2px solid #d4af37; pointer-events: auto; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="btn-back" onclick="location.href='categories.html'">⬅ กลับ</button>
        <b id="header-title">คลังหนังสือ</b>
        <div style="width:50px;"></div>
    </div>

    <div class="container" id="book-list"></div>

    <div id="reader-overlay">
        <div class="reader-header">
            <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:5px 15px; border-radius:5px;">ปิด</button>
            <span id="page-info">หน้า 0/0</span>
        </div>
        <div style="flex-grow:1; overflow:auto; display:flex; background:#333;"><canvas id="pdf-canvas"></canvas></div>
        <div class="nav-controls"><button class="nav-btn" onclick="prevPage()">❮</button><button class="nav-btn" onclick="nextPage()">❯</button></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
        const params = new URLSearchParams(window.location.search);
        const categoryKey = params.get('cat') || '1_PetchPraUma';
        document.getElementById('header-title').innerText = params.get('name') || 'คลังหนังสือ';

        let pdfDoc = null, pageNum = 1, currentBookUrl = "";
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

        async function loadData() {
            // ดึงไฟล์ database.json ที่คุณรันนราเพิ่งสร้าง
            const response = await fetch("database.json");
            const data = await response.json();
            const books = data[categoryKey] || [];
            
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = books.length ? '' : '<p>ยังไม่มีหนังสือในหมวดนี้ครับ</p>';

            books.forEach(bookName => {
                const card = document.createElement('div');
                card.className = 'book-card';
                // สร้างที่อยู่ไฟล์โดยใช้ชื่อหมวดและชื่อไฟล์
                const fileUrl = `https://rung-sup.github.io/mybook/${categoryKey}/${encodeURIComponent(bookName)}`;
                card.onclick = () => openBook(fileUrl);
                card.innerHTML = `<div class="book-cover">${bookName.replace('.pdf','')}</div><div class="book-info">${bookName}</div>`;
                listDiv.appendChild(card);
            });
        }

        async function openBook(url) {
            document.getElementById('reader-overlay').style.display = 'flex';
            const loadingTask = pdfjsLib.getDocument(url);
            pdfDoc = await loadingTask.promise;
            pageNum = 1;
            renderPage(pageNum);
        }

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 1.5 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        }

        function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
        function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
        function closeBook() { document.getElementById('reader-overlay').style.display = 'none'; pdfDoc = null; }

        loadData();
    </script>
</body>
</html>
