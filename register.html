<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการหนังสือ - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; }
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 8px 18px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        h2 { text-align: center; color: #4a148c; margin-bottom: 25px; }

        /* --- ส่วนชั้นหนังสืออ่านล่าสุด (Shelf) --- */
        #recent-shelf { display: none; margin-bottom: 40px; padding: 20px; background: #fff; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .shelf-title { margin: 0 0 15px 0; color: #333; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        /* --- Grid การแสดงผล --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 8px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); }
        .cover-box { width: 100%; height: 210px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-tag { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 4px; font-size: 11px; text-align: center; }
        .status-done { background: #2e7d32; color: #fff; font-weight: bold; }
        .folder-badge { position: absolute; top: 10px; right: 10px; background: #ff9800; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }

        /* --- Overlay โฟลเดอร์ (เมนูเดิม) --- */
        .folder-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .folder-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .list-item:hover { background: #fdfaf0; color: #4a148c; }

        /* --- Reader Overlay --- */
        #reader-overlay { display: none; position: fixed; inset: 0; background: #333; z-index: 300; flex-direction: column; }
        .reader-controls { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #pdf-render-container { flex: 1; overflow: auto; display: flex; justify-content: center; background: #525659; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="header">
    <a href="categories.html" class="btn-back">⬅ กลับหน้าหลัก</a>
    <div id="category-name" style="font-weight: 600; color: #4a148c;"></div>
</div>

<div class="container">
    <div id="recent-shelf">
        <h3 class="shelf-title">📖 อ่านค้างไว้ / อ่านจบแล้ว</h3>
        <div id="recent-grid" class="grid"></div>
    </div>

    <h2 id="display-title">รายการหนังสือ</h2>
    <div id="book-grid" class="grid"></div>
</div>

<div id="folder-overlay" class="folder-overlay" onclick="closeFolder()">
    <div class="folder-content" onclick="event.stopPropagation()">
        <h3 id="folder-title" style="margin-top: 0; color: #4a148c; border-bottom: 2px solid #f4f1ea; padding-bottom: 10px;"></h3>
        <div id="folder-list"></div>
        <button onclick="closeFolder()" style="width:100%; margin-top:20px; padding:12px; border-radius:12px; border:none; background:#eee; cursor:pointer; font-weight:600;">ปิด</button>
    </div>
</div>

<div id="reader-overlay">
    <div class="reader-controls">
        <button onclick="closeBook()" style="background:#cc0000; border:none; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">ปิดการอ่าน</button>
        <div id="page-info">หน้า 0 / 0</div>
        <div>
            <button onclick="prevPage()" style="padding:8px 12px; cursor:pointer;">ก่อนหน้า</button>
            <button onclick="nextPage()" style="padding:8px 12px; cursor:pointer;">ถัดไป</button>
        </div>
    </div>
    <div id="pdf-render-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    let allBooksRaw = []; // ฐานข้อมูลดิบทั้งหมด
    let currentBookUrl = "";
    const urlParams = new URLSearchParams(window.location.search);
    const cat = urlParams.get('cat');
    const catName = urlParams.get('name');

    document.getElementById('category-name').innerText = catName;
    document.getElementById('display-title').innerText = "หมวด " + catName;

    // 1. โหลดข้อมูลและเริ่มระบบ
    fetch('database.json')
        .then(res => res.json())
        .then(data => {
            allBooksRaw = data;
            const filtered = data.filter(b => b.category === cat);
            renderMainGrid(filtered);
            updateShelf(); // แสดงชั้นหนังสืออ่านค้าง
        });

    // 2. ฟังก์ชันแสดง Grid หลัก (คงรูปแบบเดิม)
    function renderMainGrid(books) {
        const grid = document.getElementById('book-grid');
        grid.innerHTML = '';
        const grouped = {};

        books.forEach(book => {
            if (book.folder) {
                if (!grouped[book.folder]) grouped[book.folder] = [];
                grouped[book.folder].push(book);
            } else {
                grouped['single_' + book.title] = [book];
            }
        });

        Object.keys(grouped).forEach(key => {
            const items = grouped[key];
            const isFolder = !key.startsWith('single_');
            const displayBook = items[0];
            const safeId = 'main-' + btoa(encodeURIComponent(displayBook.url)).substring(0, 12);

            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = isFolder ? () => openFolder(key, items) : () => openBook(displayBook.url);
            
            card.innerHTML = `
                <div class="cover-box">
                    ${isFolder ? `<div class="folder-badge">ชุดหนังสือ (${items.length})</div>` : ''}
                    <img id="${safeId}" src="default_cover.jpg">
                </div>
                <div class="book-info">
                    <div class="book-title">${isFolder ? key : displayBook.title}</div>
                </div>
            `;
            grid.appendChild(card);
            generateThumb(displayBook.url, safeId);
        });
    }

    // 3. ฟังก์ชันอัปเดตชั้นหนังสือ (Shelf)
    function updateShelf() {
        const history = JSON.parse(localStorage.getItem('read_history') || '[]');
        const shelfGrid = document.getElementById('recent-grid');
        const shelfSection = document.getElementById('recent-shelf');

        if (history.length === 0) {
            shelfSection.style.display = 'none';
            return;
        }

        shelfSection.style.display = 'block';
        shelfGrid.innerHTML = '';

        history.forEach(url => {
            const book = allBooksRaw.find(b => b.url === url);
            if (!book) return;

            const savedPage = parseInt(localStorage.getItem('page_' + btoa(url)) || '1');
            const totalPages = parseInt(localStorage.getItem('total_' + btoa(url)) || '0');
            const safeId = 'shelf-' + btoa(encodeURIComponent(url)).substring(0, 12);

            let statusText = `หน้า ${savedPage} / ${totalPages}`;
            let statusClass = "status-tag";
            
            if (totalPages > 0 && savedPage >= totalPages) {
                statusText = "จบแล้ว ✅";
                statusClass += " status-done";
            }

            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(url);
            card.innerHTML = `
                <div class="cover-box">
                    <img id="${safeId}" src="default_cover.jpg">
                    <div class="${statusClass}">${statusText}</div>
                </div>
                <div class="book-info">
                    <div class="book-title">${book.title}</div>
                </div>
            `;
            shelfGrid.appendChild(card);
            generateThumb(url, safeId);
        });
    }

    // 4. ฟังก์ชันเปิดโฟลเดอร์ (เมนูรายการเดิม)
    function openFolder(name, items) {
        document.getElementById('folder-title').innerText = name;
        const list = document.getElementById('folder-list');
        list.innerHTML = '';
        items.forEach(book => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${book.title}</span> <span style="color:#d4af37; font-weight:bold;">อ่าน ➔</span>`;
            div.onclick = () => { closeFolder(); openBook(book.url); };
            list.appendChild(div);
        });
        document.getElementById('folder-overlay').style.display = 'flex';
    }

    function closeFolder() { document.getElementById('folder-overlay').style.display = 'none'; }

    // 5. PDF & Reader Logic
    let pdfDoc = null, pageNum = 1, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    async function generateThumb(url, imgId) {
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 0.3 });
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.height = viewport.height; tCanvas.width = viewport.width;
            await page.render({ canvasContext: tCtx, viewport: viewport }).promise;
            const img = document.getElementById(imgId);
            if (img) img.src = tCanvas.toDataURL();
            pdf.destroy();
        } catch (e) { console.error("Thumb error", e); }
    }

    async function openBook(url) {
        currentBookUrl = url;
        document.getElementById('reader-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // บันทึกลงประวัติ (Shelf)
        let history = JSON.parse(localStorage.getItem('read_history') || '[]');
        history = [url, ...history.filter(u => u !== url)].slice(0, 4); // เก็บ 4 เล่มล่าสุด
        localStorage.setItem('read_history', JSON.stringify(history));

        pdfDoc = await pdfjsLib.getDocument(url).promise;
        localStorage.setItem('total_' + btoa(url), pdfDoc.numPages); // เก็บจำนวนหน้าทั้งหมด

        const saved = localStorage.getItem('page_' + btoa(url));
        pageNum = saved ? parseInt(saved) : 1;
        renderPage(pageNum);
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        
        // คั่นหน้าอัตโนมัติ
        localStorage.setItem('page_' + btoa(currentBookUrl), num);
    }

    function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
    function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
    
    function closeBook() { 
        document.getElementById('reader-overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
        pdfDoc = null;
        updateShelf(); // อัปเดตชั้นหนังสือทันทีที่ปิด
    }
</script>
</body>
</html>
