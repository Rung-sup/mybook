<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

<script>
    // 1. ตั้งค่าพื้นฐาน
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
    const params = new URLSearchParams(window.location.search);
    const categoryKey = params.get('cat') || '1_PetchPraUma';
    const categoryName = params.get('name') || 'คลังหนังสือ';
    
    // อัปเดตหัวข้อหน้าเว็บ
    if(document.getElementById('header-title')) {
        document.getElementById('header-title').innerText = categoryName;
    }

    let pdfDoc = null, pageNum = 1, currentBookId = "";
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas ? canvas.getContext('2d') : null;

    // 2. ฟังก์ชันโหลดข้อมูล
    async function loadData() {
        const listDiv = document.getElementById('book-list');
        if(!listDiv) {
            console.error("ไม่พบ Element id='book-list' ในหน้า HTML");
            return;
        }

        try {
            const response = await fetch(`database.json?v=${Date.now()}`);
            const allData = await response.json();
            
            // กรองเฉพาะหมวดหมู่ที่เลือก
            const catBooks = allData.filter(item => item.url && item.url.includes(`/${categoryKey}/`));

            if (categoryKey === '2_Thai_Novel') {
                // แยก "ล่องไพร" ออกมาทำ Folder
                const longPhraiFiles = catBooks.filter(item => item.url.includes('ล่องไพร'));
                const otherBooks = catBooks.filter(item => !item.url.includes('ล่องไพร'));

                let displayItems = [];
                if (longPhraiFiles.length > 0) {
                    longPhraiFiles.sort((a, b) => a.title.localeCompare(b.title, 'th', {numeric: true}));
                    displayItems.push({
                        title: "ชุด ล่องไพร (น้อย อินทนนท์)",
                        isFolder: true,
                        count: longPhraiFiles.length,
                        firstBookUrl: longPhraiFiles[0].url,
                        allFiles: longPhraiFiles
                    });
                }
                renderItems([...displayItems, ...otherBooks]);
            } else {
                catBooks.sort((a, b) => a.title.localeCompare(b.title, 'th', {numeric: true}));
                renderItems(catBooks);
            }
        } catch (err) {
            listDiv.innerHTML = `<div style="padding:20px; color:red;">เกิดข้อผิดพลาดในการโหลดข้อมูล: ${err.message}</div>`;
        }
    }

    // 3. ฟังก์ชัน Render (แสดงผล)
    function renderItems(items) {
        const listDiv = document.getElementById('book-list');
        listDiv.innerHTML = '';
        
        if(items.length === 0) {
            listDiv.innerHTML = `<div style="padding:20px;">ไม่พบหนังสือในหมวดนี้</div>`;
            return;
        }

        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'book-card';
            
            // สร้าง Image ID
            const targetUrl = item.isFolder ? item.firstBookUrl : item.url;
            let relPath = "";
            try {
                const urlObj = new URL(targetUrl, window.location.origin);
                relPath = decodeURIComponent(urlObj.pathname);
                if(relPath.startsWith('/')) relPath = relPath.substring(1);
            } catch (e) { relPath = targetUrl; }
            
            const imageId = typeof md5 !== 'undefined' ? md5(relPath) : 'default';
            const coverUrl = `covers/${categoryKey}/${imageId}.jpg`;

            if (item.isFolder) {
                card.style.border = "2px solid #d4af37";
                card.innerHTML = `
                    <div class="cover-box">
                        <div style="position:absolute; top:8px; left:8px; background:#d4af37; color:#000; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:bold; z-index:10;">FOLDER</div>
                        <img data-src="${coverUrl}" class="book-cover-img" loading="lazy" style="width:100%; height:100%; object-fit:cover;">
                        <div style="position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.8); color:#fff; padding:2px 6px; border-radius:4px; font-size:10px; z-index:10;">${item.count} เล่ม</div>
                    </div>
                    <div class="book-info" style="padding:10px; text-align:center; font-weight:bold;">${item.title}</div>
                `;
                card.onclick = () => renderItems(item.allFiles);
            } else {
                card.innerHTML = `
                    <div class="cover-box">
                        <img data-src="${coverUrl}" class="book-cover-img" loading="lazy" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="book-info" style="padding:10px; text-align:center;">${item.title}</div>
                `;
                card.onclick = () => typeof openBook === 'function' ? openBook(item.url, item.title) : console.log("กำลังเปิด:", item.title);
            }
            listDiv.appendChild(card);
        });
        
        // สั่งให้ Lazy Load ทำงาน
        if(typeof setupLazyLoad === 'function') setupLazyLoad();
    }

    // เริ่มทำงานเมื่อโหลดหน้าเสร็จ
    window.onload = loadData;
</script>
