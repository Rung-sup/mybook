<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการหนังสือ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; }
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 8px 18px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        h2 { text-align: center; color: #4a148c; margin-bottom: 30px; }
        
        /* ชั้นหนังสืออ่านล่าสุด */
        #recent-section { margin-bottom: 40px; padding: 20px; background: #fff; border-radius: 15px; display: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .cover-box { width: 100%; height: 200px; background: #ddd; display: flex; align-items: center; justify-content: center; position: relative; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        .folder-badge { position: absolute; top: 10px; right: 10px; background: #ff9800; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .book-info { padding: 10px; text-align: center; }
        .book-title { font-size: 13px; font-weight: 500; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Overlay สำหรับรายการเล่มย่อย */
        .folder-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .folder-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .list-item:hover { background: #f9f9f9; }

        /* PDF Reader Overlay */
        #reader-overlay { display: none; position: fixed; inset: 0; background: #333; z-index: 300; flex-direction: column; }
        #pdf-render-container { flex: 1; overflow: auto; display: flex; justify-content: center; background: #525659; }
        .reader-controls { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-nav:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <a href="categories.html" class="btn-back">⬅ กลับหน้าหลัก</a>
    <div id="category-name" style="font-weight: 600; color: #4a148c;">กำลังโหลด...</div>
</div>

<div class="container">
    <div id="recent-section">
        <h3 style="margin-top:0; color: #d4af37; border-bottom: 2px solid #f4f1ea; padding-bottom:10px;">📖 อ่านล่าสุด / ค้างไว้</h3>
        <div id="recent-grid" class="grid"></div>
    </div>

    <h2 id="display-title">รายการหนังสือ</h2>
    <div id="book-grid" class="grid"></div>
</div>

<div id="folder-overlay" class="folder-overlay" onclick="closeFolder()">
    <div class="folder-content" onclick="event.stopPropagation()">
        <h3 id="folder-title" style="margin-top: 0; color: #4a148c;"></h3>
        <div id="folder-list"></div>
        <button onclick="closeFolder()" style="width:100%; margin-top:15px; padding:10px; border-radius:10px; border:none; background:#eee;">ปิด</button>
    </div>
</div>

<div id="reader-overlay">
    <div class="reader-controls">
        <button onclick="closeBook()" style="background:#cc0000; border:none; color:#fff; padding:8px 15px; border-radius:5px; cursor:pointer;">ปิด</button>
        <div id="page-info">หน้า 0 / 0</div>
        <div>
            <button class="btn-nav" onclick="prevPage()">ก่อนหน้า</button>
            <button class="btn-nav" onclick="nextPage()">ถัดไป</button>
        </div>
    </div>
    <div id="pdf-render-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    let allBooks = [];
    let currentBookUrl = "";
    const urlParams = new URLSearchParams(window.location.search);
    const cat = urlParams.get('cat');
    const catName = urlParams.get('name');

    document.getElementById('category-name').innerText = catName;
    document.getElementById('display-title').innerText = "หมวด " + catName;

    // โหลด Database
    fetch('database.json')
        .then(res => res.json())
        .then(data => {
            allBooks = data; // เก็บหนังสือทั้งหมดไว้ใช้สำหรับ Recent Books
            const filteredBooks = data.filter(b => b.category === cat);
            renderGrid(filteredBooks, 'book-grid');
            renderRecent();
        });

    function renderGrid(books, targetId) {
        const grid = document.getElementById(targetId);
        grid.innerHTML = '';
        
        const grouped = {};
        books.forEach(book => {
            if (book.folder) {
                if (!grouped[book.folder]) grouped[book.folder] = [];
                grouped[book.folder].push(book);
            } else {
                grouped['single_' + book.title] = [book];
            }
        });

        Object.keys(grouped).forEach(key => {
            const items = grouped[key];
            const isFolder = !key.startsWith('single_');
            const mainBook = items[0];
            
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = isFolder ? () => openFolder(key, items) : () => openBook(mainBook.url);
            
            // สร้าง ID สำหรับรูปที่ปลอดภัย
            const safeImgId = 'img-' + btoa(encodeURIComponent(mainBook.url)).substring(0, 15);

            card.innerHTML = `
                <div class="cover-box">
                    ${isFolder ? '<div class="folder-badge">ชุดหนังสือ ('+items.length+')</div>' : ''}
                    <img id="${safeImgId}" src="default_cover.jpg">
                </div>
                <div class="book-info">
                    <div class="book-title">${isFolder ? key : mainBook.title}</div>
                </div>
            `;
            grid.appendChild(card);
            generateThumb(mainBook.url, safeImgId);
        });
    }

    // ฟังก์ชันแสดงหนังสือที่อ่านล่าสุด
    function renderRecent() {
        const recentUrls = JSON.parse(localStorage.getItem('recent_books') || '[]');
        if (recentUrls.length === 0) return;

        const recentBooks = allBooks.filter(b => recentUrls.includes(b.url));
        if (recentBooks.length > 0) {
            document.getElementById('recent-section').style.display = 'block';
            renderGrid(recentBooks, 'recent-grid');
        }
    }

    function openFolder(folderName, items) {
        document.getElementById('folder-title').innerText = folderName;
        const list = document.getElementById('folder-list');
        list.innerHTML = '';
        items.forEach(book => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${book.title}</span> <span style="color:#667eea;">อ่าน ➔</span>`;
            div.onclick = () => { closeFolder(); openBook(book.url); };
            list.appendChild(div);
        });
        document.getElementById('folder-overlay').style.display = 'flex';
    }

    function closeFolder() { document.getElementById('folder-overlay').style.display = 'none'; }

    // PDF Functions
    let pdfDoc = null, pageNum = 1, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    async function generateThumb(url, imgId) {
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 0.3 });
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.height = viewport.height; tCanvas.width = viewport.width;
            await page.render({ canvasContext: tCtx, viewport: viewport }).promise;
            const img = document.getElementById(imgId);
            if(img) img.src = tCanvas.toDataURL();
            pdf.destroy();
        } catch (e) { console.log("Thumb error", e); }
    }

    async function openBook(url) {
        currentBookUrl = url;
        document.getElementById('reader-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        // บันทึกเข้า "อ่านล่าสุด"
        let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
        recent = [url, ...recent.filter(u => u !== url)].slice(0, 4); // เก็บ 4 เล่มล่าสุด
        localStorage.setItem('recent_books', JSON.stringify(recent));

        pdfDoc = await pdfjsLib.getDocument(url).promise;
        
        // ดึงหน้าที่คั่นไว้ (Bookmark)
        const savedPage = localStorage.getItem('page_' + btoa(url));
        pageNum = savedPage ? parseInt(savedPage) : 1;
        
        renderPage(pageNum);
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        
        // บันทึกตำแหน่งหน้าปัจจุบันอัตโนมัติ (คั่นหนังสือ)
        localStorage.setItem('page_' + btoa(currentBookUrl), num);
    }

    function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
    function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
    
    function closeBook() { 
        document.getElementById('reader-overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
        pdfDoc = null;
        renderRecent(); // อัปเดตชั้นหนังสืออ่านล่าสุดเมื่อปิดหน้าอ่าน
    }
</script>
</body>
</html>
