<script>
    // ใช้คำสั่งนี้เพื่อดึงค่าจาก URL (เช่น ?cat=2_Thai_Novel)
    const params = new URLSearchParams(window.location.search);
    const categoryKey = params.get('cat') || '1_PetchPraUma';
    document.getElementById('header-title').innerText = params.get('name') || 'คลังหนังสือ';
    
    let pdfDoc = null, pageNum = 1, currentBookId = "";
    const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    async function loadData() {
        try {
            const response = await fetch(`database.json?v=${Date.now()}`);
            const allData = await response.json();
            
            // กรองข้อมูลตามหมวดที่คลิกเข้ามา
            const catBooks = allData.filter(item => item.url && item.url.includes(`/${categoryKey}/`));

            // ตรวจสอบเงื่อนไข: ถ้าเป็นหมวด "นิยายไทย" ให้มัดรวม "ล่องไพร"
            if (categoryKey === '2_Thai_Novel') {
                const longPhraiFiles = catBooks.filter(item => item.url.includes('ล่องไพร'));
                const otherBooks = catBooks.filter(item => !item.url.includes('ล่องไพร'));

                let displayItems = [];

                if (longPhraiFiles.length > 0) {
                    longPhraiFiles.sort((a, b) => a.title.localeCompare(b.title, 'th', {numeric: true}));
                    displayItems.push({
                        title: "ชุด ล่องไพร (รวมตอน)",
                        isFolder: true,
                        count: longPhraiFiles.length,
                        firstBookUrl: longPhraiFiles[0].url,
                        allFiles: longPhraiFiles
                    });
                }

                // แสดง Folder ล่องไพร ก่อน แล้วตามด้วยนิยายไทยเรื่องอื่นๆ
                renderItems([...displayItems, ...otherBooks]);
            } else {
                // หมวดอื่นๆ (เช่น เพชรพระอุมา) ให้แสดงรายเล่มตามปกติ
                catBooks.sort((a, b) => a.title.localeCompare(b.title, 'th', {numeric: true}));
                renderItems(catBooks);
            }
        } catch (err) { console.error(err); }
    }

    function renderItems(items) {
        const listDiv = document.getElementById('book-list');
        listDiv.innerHTML = '';
        
        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'book-card';
            
            // หา Image ID จาก URL (ถ้าเป็น Folder ให้ใช้ URL ของเล่มแรก)
            const targetUrl = item.isFolder ? item.firstBookUrl : item.url;
            let relPath = "";
            try {
                const urlPath = new URL(targetUrl, window.location.origin).pathname;
                relPath = decodeURIComponent(urlPath);
                if(relPath.startsWith('/')) relPath = relPath.substring(1);
            } catch (e) { relPath = targetUrl; }
            
            const imageId = md5(relPath); 
            const coverUrl = `covers/${categoryKey}/${imageId}.jpg`;

            if (item.isFolder) {
                card.style.border = "2px solid #d4af37"; // ขอบสีทองแสดงความเป็น Folder
                card.innerHTML = `
                    <div class="cover-box">
                        <img data-src="${coverUrl}" class="book-cover-img" loading="lazy">
                        <div style="position:absolute; top:5px; left:5px; background:#d4af37; color:#000; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:bold;">FOLDER</div>
                        <div style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.85); color:#fff; padding:2px 6px; border-radius:4px; font-size:10px;">${item.count} เล่ม</div>
                    </div>
                    <div class="book-info"><div><b>${item.title}</b></div></div>
                `;
                card.onclick = () => renderItems(item.allFiles); // คลิกแล้วแสดงไฟล์ข้างใน
            } else {
                card.innerHTML = `
                    <div class="cover-box">
                        <img data-src="${coverUrl}" class="book-cover-img" loading="lazy">
                    </div>
                    <div class="book-info"><div>${item.title}</div></div>
                `;
                card.onclick = () => openBook(item.url, item.title);
            }
            listDiv.appendChild(card);
        });
        setupLazyLoad();
    }

    // --- ฟังก์ชันอื่นๆ (setupLazyLoad, openBook, renderPage) ให้คงไว้ตามเดิม ---
    function setupLazyLoad() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                    img.onerror = () => { img.src = 'https://via.placeholder.com/150x220?text=No+Cover'; img.classList.add('loaded'); };
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '200px' });
        document.querySelectorAll('.book-cover-img').forEach(img => observer.observe(img));
    }
    // ... (ส่วนโค้ด openBook และ renderPage เดิมของคุณ) ...
    loadData();
</script>
