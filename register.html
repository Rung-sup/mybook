<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
    const params = new URLSearchParams(window.location.search);
    const categoryKey = params.get('cat') || '1_PetchPraUma';
    document.getElementById('header-title').innerText = params.get('name') || 'คลังหนังสือ';

    let pdfDoc = null, pageNum = 1;
    const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    // ฟังก์ชันดึงตัวเลขออกจากชื่อ (เช่น "เล่ม 10" -> 10)
    function getNum(str) {
        const match = str.match(/\d+/);
        return match ? parseInt(match[0], 10) : 0;
    }

    async function loadData() {
    try {
        const response = await fetch(`database.json?v=${new Date().getTime()}`);
        const data = await response.json();
        
        const marker = `/${categoryKey}/`;
        // กรองเอาเฉพาะหมวดนี้ แต่ "ห้าม" สั่ง .sort() ซ้ำในนี้ครับ 
        // เพราะ Python เรียงมาให้ดีแล้ว
        let books = data.filter(item => item.url && item.url.includes(marker));

        const listDiv = document.getElementById('book-list');
        listDiv.innerHTML = '';
        books.forEach((book, index) => {
            const imgId = `img-${index}`;
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(book.url);
            card.innerHTML = `
                <div class="cover-box">
                    <img id="${imgId}" class="book-cover-img" style="display:none;">
                    <span id="load-${imgId}" style="color:#aaa; font-size:10px;">โหลดปก...</span>
                </div>
                <div class="book-info">${book.title}</div>
            `;
            listDiv.appendChild(card);
            generateThumb(book.url, imgId);
        });
    } catch (err) { console.error(err); }
}

    // ... (ส่วนฟังก์ชันอื่นๆ generateThumb, openBook, renderPage เหมือนเดิม) ...
</script>
