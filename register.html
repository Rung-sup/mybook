<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังหนังสือส่วนตัว (System Pro 1200+)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        /* การตั้งค่าพื้นฐาน */
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f4f1ea; color: #333; overflow-x: hidden; }
        
        /* Header คงเดิม */
        .header { 
            padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background: #fff; position: sticky; top: 0; z-index: 100; 
            display: flex; align-items: center; justify-content: space-between; 
        }
        .btn-back { 
            background: #333; color: #d4af37; border: 1px solid #d4af37; 
            padding: 8px 18px; border-radius: 25px; text-decoration: none; font-size: 14px;
        }

        /* ส่วนชั้นหนังสือส่วนตัว */
        .my-library-section { 
            background: linear-gradient(to bottom, #e5e2d9, #f4f1ea); 
            padding: 25px 20px; border-bottom: 3px solid #d4af37;
            display: none; 
        }
        .section-title { 
            font-size: 18px; font-weight: 600; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 10px; color: #5d4037;
        }

        /* Grid Layout สำหรับ 1200 เล่ม */
        .container { 
            padding: 20px; max-width: 1200px; margin: 0 auto; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; 
        }

        .book-card { 
            background: #fff; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); cursor: pointer; 
            transition: 0.3s ease; position: relative; display: flex; flex-direction: column;
            min-height: 250px; /* จองพื้นที่ไว้ก่อนโหลด */
        }
        .book-card:active { transform: scale(0.95); }
        
        .cover-box { 
            width: 100%; aspect-ratio: 2/3; background: #e0e0e0; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .book-cover-img { width: 100%; height: 100%; object-fit: cover; background: #eee; }
        .book-info { padding: 12px 8px; font-size: 12px; text-align: center; height: 55px; line-height: 1.3; font-weight: 500; }

        /* Badge สถานะ */
        .badge { 
            position: absolute; top: 10px; left: 10px; color: #fff; 
            font-size: 10px; padding: 4px 12px; border-radius: 20px; 
            z-index: 5; font-weight: 600; box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        .badge-reading { background: #d4af37; border: 1px solid #fff; } 
        .badge-finished { background: #27ae60; border: 1px solid #fff; } 

        /* PDF Reader Overlay */
        #reader-overlay { display: none; position: fixed; inset: 0; background: #111; z-index: 2000; flex-direction: column; }
        .reader-header { background: #222; color: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        #pdf-render-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 10px 0; }
        #pdf-canvas { max-width: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .nav-controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; }
        .nav-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(0,0,0,0.9); color: #d4af37; border: 2px solid #d4af37; pointer-events: auto; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header">
    <a href="categories.html" class="btn-back">❮ กลับ</a>
    <b id="header-title" style="font-size: 18px;">คลังหนังสือ</b>
    <div style="width:40px;"></div>
</div>

<div id="personal-library" class="my-library-section">
    <div class="section-title">📖 ชั้นหนังสือส่วนตัวของคุณ</div>
    <div id="my-books-grid" class="container" style="padding:0;"></div>
</div>

<div class="container">
    <div class="section-title">📂 รายการหนังสือในหมวดนี้</div>
</div>
<div id="all-books-grid" class="container"></div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
    
    const params = new URLSearchParams(window.location.search);
    const categoryKey = params.get('cat') || '1_PetchPraUma';
    document.getElementById('header-title').innerText = params.get('name') || 'คลังหนังสือ';

    let pdfDoc = null, pageNum = 1, currentBookUrl = "", currentBookId = "";
    const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    // ระบบ Lazy Loading: ตรวจจับว่ารูปภาพโผล่มาในจอหรือยัง
    const observerOptions = { rootMargin: '200px 0px', threshold: 0.01 };
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                const url = img.getAttribute('data-pdf-url');
                const imgId = img.id;
                if (url) {
                    renderThumbnail(url, imgId);
                    observer.unobserve(img); // โหลดแล้วเลิกตรวจจับ
                }
            }
        });
    }, observerOptions);

    async function loadApp() {
        try {
            const response = await fetch(`database.json?v=${Date.now()}`);
            const allData = await response.json();
            
            // กรองหมวดปัจจุบัน
            const marker = `/${categoryKey}/`;
            let booksInCat = allData.filter(item => item.url && item.url.includes(marker));
            booksInCat.sort((a, b) => a.title.localeCompare(b.title, 'th', { numeric: true }));

            // ประวัติการอ่าน
            let readHistory = JSON.parse(localStorage.getItem('read_history') || '[]');
            let myPersonalBooks = allData.filter(book => readHistory.includes(book.url));
            myPersonalBooks.sort((a, b) => a.title.localeCompare(b.title, 'th', { numeric: true }));

            renderPersonalLibrary(myPersonalBooks);
            renderAllBooks(booksInCat);
        } catch (e) { console.error(e); }
    }

    function renderPersonalLibrary(myBooks) {
        const grid = document.getElementById('my-books-grid');
        const section = document.getElementById('personal-library');
        if (myBooks.length > 0) {
            section.style.display = 'block';
            grid.innerHTML = '';
            myBooks.forEach((book, idx) => grid.appendChild(createBookCard(book, `personal-${idx}`)));
        } else {
            section.style.display = 'none';
        }
    }

    function renderAllBooks(books) {
        const grid = document.getElementById('all-books-grid');
        grid.innerHTML = '';
        books.forEach((book, idx) => grid.appendChild(createBookCard(book, `all-${idx}`)));
    }

    function createBookCard(book, idPrefix) {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => openBook(book.url, book.title);
        
        const bookId = btoa(book.url);
        const savedPage = parseInt(localStorage.getItem('page_' + bookId)) || 0;
        const isFinished = localStorage.getItem('status_' + bookId) === 'finished';
        const imgId = `img-${idPrefix}`;

        let badge = '';
        if (isFinished) {
            badge = `<div class="badge badge-finished">อ่านจบแล้ว ✅</div>`;
        } else if (savedPage > 0) {
            badge = `<div class="badge badge-reading">ค้างหน้า ${savedPage}</div>`;
        }

        card.innerHTML = `
            ${badge}
            <div class="cover-box">
                <img id="${imgId}" class="book-cover-img" data-pdf-url="${book.url}" style="display:none;">
                <span id="loader-${imgId}" style="font-size:10px; color:#999;">รอโหลด...</span>
            </div>
            <div class="book-info">${book.title}</div>
        `;
        
        // ส่งรูปเข้าสู่ระบบตรวจจับ Lazy Load
        const targetImg = card.querySelector('.book-cover-img');
        imageObserver.observe(targetImg);
        
        return card;
    }

    // ฟังก์ชันเรนเดอร์ปกเฉพาะเล่ม (ทำงานเมื่อเลื่อนมาเจอ)
    async function renderThumbnail(url, imgId) {
        let pdf = null;
        try {
            const loadingTask = pdfjsLib.getDocument(url);
            pdf = await loadingTask.promise;
            const page = await pdf.getPage(1);
            
            // ปรับ scale ให้เล็กมากเพื่อความรวดเร็วสำหรับ 1200 เล่ม
            const vp = page.getViewport({ scale: 0.12 }); 
            const tCanvas = document.createElement('canvas'), tCtx = tCanvas.getContext('2d');
            tCanvas.height = vp.height; tCanvas.width = vp.width;
            
            await page.render({ canvasContext: tCtx, viewport: vp }).promise;
            
            const img = document.getElementById(imgId);
            if(img) {
                img.src = tCanvas.toDataURL('image/jpeg', 0.5);
                img.style.display = 'block';
                const loader = document.getElementById('loader-' + imgId);
                if(loader) loader.style.display = 'none';
            }
        } catch (e) {
            const loader = document.getElementById('loader-' + imgId);
            if(loader) loader.innerText = "ไม่มีปก";
        } finally {
            if (pdf) await pdf.destroy(); // คืน RAM ทันที
        }
    }

    async function openBook(url, title) {
        currentBookUrl = url;
        currentBookId = btoa(url);
        document.getElementById('reader-overlay').style.display = 'flex';
        document.getElementById('book-title-display').innerText = title;
        document.body.style.overflow = 'hidden';

        let history = JSON.parse(localStorage.getItem('read_history') || '[]');
        if (!history.includes(url)) {
            history.unshift(url);
            localStorage.setItem('read_history', JSON.stringify(history));
        }

        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            const savedPage = localStorage.getItem('page_' + currentBookId);
            pageNum = savedPage ? parseInt(savedPage) : 1;
            renderPage(pageNum);
        } catch (e) { alert("โหลดไฟล์ไม่สำเร็จ"); closeBook(); }
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const screenWidth = window.innerWidth > 600 ? 600 : window.innerWidth;
        const viewport = page.getViewport({ scale: (screenWidth * 1.5) / page.getViewport({ scale: 1 }).width });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        localStorage.setItem('page_' + currentBookId, num);
        
        if (num === pdfDoc.numPages) {
            localStorage.setItem('status_' + currentBookId, 'finished');
        } else {
            localStorage.removeItem('status_' + currentBookId);
        }
        document.getElementById('pdf-render-container').scrollTop = 0;
    }

    function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
    function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
    function closeBook() { 
        document.getElementById('reader-overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto';
        pdfDoc = null; 
        loadApp(); 
    }
    loadApp();
</script>

<div id="reader-overlay">
    <div class="reader-header">
        <button onclick="closeBook()" style="background:#e74c3c; color:white; border:none; padding:8px 18px; border-radius:8px; cursor:pointer; font-weight:600;">ปิด</button>
        <div id="book-title-display" style="font-size:13px; color:#d4af37; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40%;"></div>
        <span id="page-info" style="font-size:12px;">หน้า 0 / 0</span>
    </div>
    <div id="pdf-render-container"><canvas id="pdf-canvas"></canvas></div>
    <div class="nav-controls">
        <button class="nav-btn" onclick="prevPage()">❮</button>
        <button class="nav-btn" onclick="nextPage()">❯</button>
    </div>
</div>

</body>
</html>
