<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการหนังสือ - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; }
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .btn-back { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 8px 18px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        h2 { text-align: center; color: #4a148c; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; }
        .book-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #eee; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .cover-box { width: 100%; height: 210px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; position: relative; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .folder-badge { position: absolute; top: 10px; right: 10px; background: #ff9800; color: white; padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .book-info { padding: 12px; text-align: center; background: #fff; }
        .book-title { font-size: 13px; font-weight: 500; color: #333; line-height: 1.4; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Overlay สำหรับกางหนังสือในโฟลเดอร์ */
        .folder-overlay { display: none; position: fixed; inset: 0; background: rgba(244, 241, 234, 0.98); z-index: 200; overflow-y: auto; padding: 40px 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .folder-header { max-width: 1000px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: space-between; }
        
        /* Reader UI */
        #reader-overlay { display: none; position: fixed; inset: 0; background: #333; z-index: 300; flex-direction: column; }
        .reader-controls { background: #222; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        #pdf-render-container { flex: 1; overflow: auto; display: flex; justify-content: center; background: #525659; padding: 20px 0; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; }
        .nav-btn { background: #444; color: white; border: 1px solid #666; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 0 5px; }
        .nav-btn:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <a href="categories.html" class="btn-back">⬅ กลับหน้าหลัก</a>
    <div id="category-name" style="font-weight: 600; color: #4a148c; font-size: 18px;"></div>
</div>

<div class="container">
    <h2 id="display-title"></h2>
    <div id="book-grid" class="grid"></div>
</div>

<div id="folder-overlay" class="folder-overlay">
    <div class="folder-header">
        <h2 id="folder-title" style="margin:0; color:#4a148c;"></h2>
        <button onclick="closeFolder()" class="btn-back" style="background:#cc0000; color:#fff; border:none;">✖ ปิดหน้านี้</button>
    </div>
    <div id="folder-grid" class="grid" style="max-width:1000px; margin:auto;"></div>
</div>

<div id="reader-overlay">
    <div class="reader-controls">
        <button onclick="closeBook()" style="background:#cc0000; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">ปิดการอ่าน</button>
        <div id="page-info" style="font-size:14px;">หน้า 0 / 0</div>
        <div>
            <button class="nav-btn" onclick="prevPage()">◀ ก่อนหน้า</button>
            <button class="nav-btn" onclick="nextPage()">ถัดไป ▶</button>
        </div>
    </div>
    <div id="pdf-render-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    let allBooks = [];
    let currentBookUrl = "";
    let pdfDoc = null, pageNum = 1, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

    const urlParams = new URLSearchParams(window.location.search);
    const cat = urlParams.get('cat');
    const catName = urlParams.get('name');

    document.getElementById('category-name').innerText = catName;
    document.getElementById('display-title').innerText = "หมวด " + catName;

    fetch('database.json')
        .then(res => res.json())
        .then(data => {
            allBooks = data.filter(b => b.category === cat);
            renderMainGrid();
        });

    function renderMainGrid() {
        const grid = document.getElementById('book-grid');
        grid.innerHTML = '';
        const grouped = {};

        allBooks.forEach(book => {
            if (book.folder) {
                if (!grouped[book.folder]) grouped[book.folder] = [];
                grouped[book.folder].push(book);
            } else {
                grouped['single_' + book.title] = [book];
            }
        });

        Object.keys(grouped).forEach(key => {
            const items = grouped[key];
            const isFolder = !key.startsWith('single_');
            const displayBook = items[0];
            
            const card = createCard(isFolder ? key : displayBook.title, displayBook.url, isFolder, items.length);
            card.onclick = isFolder ? () => openFolder(key, items) : () => openBook(displayBook.url);
            grid.appendChild(card);
            generateThumb(displayBook.url, 'thumb-' + btoa(encodeURIComponent(displayBook.url)).substring(0,15));
        });
    }

    function createCard(title, url, isFolder, count) {
        const id = 'thumb-' + btoa(encodeURIComponent(url)).substring(0,15);
        const div = document.createElement('div');
        div.className = 'book-card';
        div.innerHTML = `
            <div class="cover-box">
                ${isFolder ? `<div class="folder-badge">ชุดหนังสือ (${count})</div>` : ''}
                <img id="${id}" src="default_cover.jpg">
            </div>
            <div class="book-info">
                <div class="book-title">${title}</div>
            </div>
        `;
        return div;
    }

    function openFolder(name, items) {
        document.getElementById('folder-title').innerText = name;
        const fGrid = document.getElementById('folder-grid');
        fGrid.innerHTML = '';
        
        items.forEach(book => {
            const card = createCard(book.title, book.url, false);
            card.onclick = () => openBook(book.url);
            fGrid.appendChild(card);
            generateThumb(book.url, 'thumb-' + btoa(encodeURIComponent(book.url)).substring(0,15));
        });
        document.getElementById('folder-overlay').style.display = 'block';
        window.scrollTo(0,0);
    }

    function closeFolder() { document.getElementById('folder-overlay').style.display = 'none'; }

    async function generateThumb(url, imgId) {
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 0.4 });
            const tCanvas = document.createElement('canvas');
            const tCtx = tCanvas.getContext('2d');
            tCanvas.height = viewport.height; tCanvas.width = viewport.width;
            await page.render({ canvasContext: tCtx, viewport: viewport }).promise;
            const imgElement = document.getElementById(imgId);
            if(imgElement) imgElement.src = tCanvas.toDataURL();
            pdf.destroy();
        } catch (e) { console.error("Thumbnail error", e); }
    }

    async function openBook(url) {
        currentBookUrl = url;
        document.getElementById('reader-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        
        // ระบบ Bookmark: ดึงหน้าที่เคยอ่านค้างไว้
        const savedPage = localStorage.getItem('page_' + btoa(url));
        pageNum = savedPage ? parseInt(savedPage) : 1;
        
        renderPage(pageNum);
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        
        // บันทึกหน้าปัจจุบันลง LocalStorage
        localStorage.setItem('page_' + btoa(currentBookUrl), num);
        document.getElementById('pdf-render-container').scrollTop = 0;
    }

    function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
    function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
    
    function closeBook() { 
        document.getElementById('reader-overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
        pdfDoc = null;
    }
</script>
</body>
</html>
