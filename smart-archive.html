<!DOCTYPE html>

<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>คลังหนังสืออัจฉริยะ - My Reader</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

   

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>



    <style>

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body { margin: 0; transition: 0.5s; background-color: #f4f1ea; min-height: 100vh; }

       

        .header { padding: 20px; text-align: center; font-size: 20px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }

        .btn-back-home { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; }

        .container { padding: 20px; max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }

        .book-card { background: #fff; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border: 1px solid transparent; }

        .book-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.2); }

        .book-cover { width: 100%; height: 210px; object-fit: cover; border-bottom: 1px solid #eee; }

        .book-info { padding: 10px; text-align: center; background: #eee; color: #333; flex-grow: 1; }

        .book-name { font-size: 13px; height: 38px; overflow: hidden; font-weight: 500; }



        /* Themes */

        .theme-forest { background-color: #1a2a1a; color: #d4af37; background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png'); }

        .theme-forest .header { background: #2d472d; color: #d4af37; border-bottom: 2px solid #d4af37; }

        .theme-forest .book-card { border: 1px solid #d4af37; background: #fdf5e6; }

        .theme-forest .book-info { background: #2d472d; color: #fff; }



        .theme-china { background-color: #4a0404; color: #ffd700; }

        .theme-china .header { background: #800000; color: #ffd700; }

        .theme-china .book-info { background: #800000; color: #fff; }



        .theme-classic { background-color: #f4f1ea; color: #3d2b1f; }

        .theme-classic .header { background: #3d2b1f; color: #e6ccb2; }



        /* Reader Overlay */

        #reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf5e6; z-index: 2000; flex-direction: column; }

        .reader-header { background: #222; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }

        #pdf-viewer { width: 100%; height: 100%; border: none; display: none; }

        #epub-viewer { width: 100%; height: 100%; display: none; position: relative; background: #fdf5e6; }

        #epub-render { width: 100%; height: 100%; }



        /* Gold UI */

        #reading-progress { position: fixed; top: 52px; left: 0; width: 0%; height: 5px; background: #d4af37; z-index: 9998; transition: 0.3s ease; box-shadow: 0 0 10px rgba(212, 175, 85, 0.5); }

        .nav-controls { position: fixed; bottom: 40px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 25px; pointer-events: none; z-index: 9999; }

        .nav-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(0, 0, 0, 0.8); color: #d4af37; border: 2px solid #d4af37; font-size: 28px; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .nav-btn:active { transform: scale(0.9); background: #d4af37; color: #fff; }

    </style>

</head>

<body id="main-body">



    <div class="header">

        <button class="btn-back-home" onclick="location.href='categories.html'">⬅ ย้อนกลับ</button>

        <span id="header-title">คลังหนังสือ</span>

        <div style="width:70px;"></div>

    </div>



    <div class="container" id="book-list">

        <p style="text-align:center; grid-column: 1/-1;">กำลังดึงข้อมูลปกหนังสือ...</p>

    </div>



    <div id="reader-overlay">

        <div class="reader-header">

            <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">❌ ปิด</button>

            <span id="book-title-display" style="font-size:13px; color:#d4af37; flex-grow:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 10px;"></span>

            <span id="page-info" style="font-size:12px; color:#ccc; min-width:45px; text-align:right;">0%</span>

        </div>



        <div id="reading-progress"></div>

        <iframe id="pdf-viewer"></iframe>

        <div id="epub-viewer"><div id="epub-render"></div></div>



        <div class="nav-controls" id="epub-nav-ui">

            <button class="nav-btn" onclick="prevPage()">❮</button>

            <button class="nav-btn" onclick="nextPage()">❯</button>

        </div>

    </div>



    <script>

        const API_KEY = 'AIzaSyCBOpYiLVCkxSbTvT1_CTIwBG8FoAbnJNY';

       

        // 🟢 อ่านค่าจาก URL ให้ถูกต้อง

        const params = new URLSearchParams(window.location.search);

        const currentFolderId = params.get('folder') || '1pvcnXlAmpc8NR24DSE7X539zNUQznhyB';

        const categoryName = params.get('name');

        const theme = params.get('theme');



        let allBooks = [];

        let currentIndex = -1;

        let rendition;

        let currentBook;



        if(categoryName) document.getElementById('header-title').innerText = "คลัง: " + categoryName;

        if(theme) document.getElementById('main-body').className = 'theme-' + theme;



        // ฟังก์ชันดึงรูปปกจาก Google Drive

        async function loadBooks() {

            const url = `https://www.googleapis.com/drive/v3/files?q='${currentFolderId}'+in+parents+and+trashed=false&fields=files(id,name,thumbnailLink,mimeType)&key=${API_KEY}`;

            try {

                const response = await fetch(url);

                const data = await response.json();

                allBooks = data.files;

                allBooks.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));



                const listDiv = document.getElementById('book-list');

                listDiv.innerHTML = '';



                allBooks.forEach((file, index) => {

                    const coverUrl = file.thumbnailLink ? file.thumbnailLink.replace('s220', 's500') : 'https://via.placeholder.com/200x300?text=ไม่มีรูปปก';

                    const card = document.createElement('div');

                    card.className = 'book-card';

                    card.onclick = () => openBook(index);

                    card.innerHTML = `

                        <img src="${coverUrl}" class="book-cover">

                        <div class="book-info"><div class="book-name">${file.name}</div></div>

                    `;

                    listDiv.appendChild(card);

                });

            } catch (e) {

                console.error(e);

                document.getElementById('book-list').innerHTML = '<p style="text-align:center; color:red;">เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาตรวจสอบ Folder ID</p>';

            }

        }



        // ฟังก์ชันเปิดหนังสือ (อ่าน EPUB จาก GitHub, อ่าน PDF จาก Drive)

        async function openBook(index) {

            currentIndex = index;

            const file = allBooks[index];

            const isEpub = file.name.toLowerCase().endsWith('.epub');

           

            document.getElementById('book-title-display').innerText = file.name;

            document.getElementById('reader-overlay').style.display = 'flex';

            document.getElementById('reading-progress').style.width = '0%';

            document.getElementById('page-info').innerText = '0%';



            if (isEpub) {

                document.getElementById('pdf-viewer').style.display = 'none';

                document.getElementById('epub-viewer').style.display = 'block';

                document.getElementById('epub-nav-ui').style.display = 'flex';



                // ดึง EPUB จาก GitHub ของคุณปุ๊ก

                const bookUrl = "https://rung-sup.github.io/mybook/" + encodeURIComponent(file.name);

               

                if(currentBook) currentBook.destroy();

                currentBook = ePub(bookUrl);

               

                rendition = currentBook.renderTo("epub-render", {

                    width: "100%", height: "100%", flow: "paginated", manager: "default"

                });



                rendition.themes.default({

                    'body': { 'font-family': "'Prompt', sans-serif !important", 'padding': '0 20px !important' },

                    'p': { 'font-size': '18px !important', 'line-height': '1.7 !important' }

                });



                currentBook.ready.then(() => {

                    return currentBook.locations.generate(1000);

                }).then(() => {

                    updateProgress();

                });



                // จำหน้าล่าสุด

                const savedLocation = localStorage.getItem('bookmark-' + file.id);

                await rendition.display(savedLocation || undefined);



                rendition.on("relocated", (location) => {

                    localStorage.setItem('bookmark-' + file.id, location.start.cfi);

                    updateProgress(location);

                });



            } else {

                // ถ้าเป็น PDF เปิดผ่าน Drive iframe

                document.getElementById('epub-viewer').style.display = 'none';

                document.getElementById('epub-nav-ui').style.display = 'none';

                document.getElementById('pdf-viewer').style.display = 'block';

                document.getElementById('pdf-viewer').src = `https://drive.google.com/file/d/${file.id}/preview?rm=minimal`;

            }

        }



        function updateProgress(location) {

            if (!currentBook || !rendition) return;

            let percent = 0;

            const currentLocation = location || rendition.currentLocation();

            if (currentLocation && currentLocation.start) {

                if (currentBook.locations && currentBook.locations.length() > 0) {

                    percent = Math.floor(currentBook.locations.percentageFromCfi(currentLocation.start.cfi) * 100);

                } else if (currentLocation.start.percentage) {

                    percent = Math.floor(currentLocation.start.percentage * 100);

                }

            }

            if (percent >= 0) {

                document.getElementById('reading-progress').style.width = percent + '%';

                document.getElementById('page-info').innerText = percent + '%';

            }

        }



        function prevPage() { if (rendition) rendition.prev(); }

        function nextPage() { if (rendition) rendition.next(); }



        function closeBook() {

            document.getElementById('reader-overlay').style.display = 'none';

            document.getElementById('pdf-viewer').src = "";

            if(currentBook) { currentBook.destroy(); currentBook = null; }

            rendition = null;

        }



        loadBooks();

    </script>

</body>

</html>
