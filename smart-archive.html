<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือคุณรันนรา - My Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; min-height: 100vh; }
        
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; background: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-back-home { background: #333; border: 1px solid #d4af37; color: #d4af37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; }

        /* Search Bar */
        .search-container { padding: 0 5px; margin-bottom: 5px; }
        #searchInput { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; font-size: 15px; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .my-shelf-section { background: rgba(212, 175, 55, 0.1); padding: 20px; border-bottom: 2px solid #d4af37; margin-bottom: 10px; display: none; }
        .shelf-title { font-size: 16px; font-weight: 600; color: #3d2b1f; margin-bottom: 15px; }
        .shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .book-cover { width: 100%; height: 180px; object-fit: cover; background: #eee; border-bottom: 1px solid #eee; }
        .book-info { padding: 8px; text-align: center; flex-grow: 1; }
        .book-name { font-size: 11px; height: 32px; overflow: hidden; font-weight: 500; line-height: 1.4; color: #333; }
        .folder-badge { font-size: 9px; color: #d4af37; margin-bottom: 2px; display: block; }
        .bookmark-badge { position: absolute; top: 5px; right: 5px; background: #d4af37; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 5px; z-index: 5; }

        /* Reader Overlay */
        #reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #222; z-index: 2000; flex-direction: column; }
        .reader-header { background: #111; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        #pdf-render-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; background: #333; padding: 10px; }
        #pdf-canvas { max-width: 100%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #epub-viewer { width: 100%; height: 100%; background: #fff; }
        .nav-controls { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 3000; }
        .nav-btn { width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #d4af37; border: 2px solid #d4af37; pointer-events: auto; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button id="mainBackButton" class="btn-back-home" onclick="location.href='categories.html'">⬅ กลับ</button>
            <span id="header-title" style="font-weight:600;">คลังของคุณรันนรา</span>
            <div style="width:40px;"></div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อเรื่อง หรือ ผู้แต่ง/ผู้แปล...">
        </div>
    </div>

    <div id="my-shelf" class="my-shelf-section">
        <div class="shelf-title">⭐ อ่านล่าสุด</div>
        <div id="shelf-list" class="shelf-grid"></div>
    </div>

    <div class="container" id="book-list">
        <p style="text-align:center; grid-column: 1/-1;">กำลังโหลดชั้นหนังสือ...</p>
    </div>

    <div id="reader-overlay">
        <div class="reader-header">
            <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:6px 15px; border-radius:5px;">ปิด</button>
            <span id="book-title-display" style="font-size:11px; color:#d4af37;"></span>
            <span id="page-info" style="font-size:11px; color:#ccc;">หน้า 0/0</span>
        </div>
        <div id="pdf-render-container" style="display:none;"><canvas id="pdf-canvas"></canvas></div>
        <div id="epub-viewer" style="display:none;"><div id="epub-render" style="width:100%; height:100%;"></div></div>
        <div class="nav-controls"><button class="nav-btn" onclick="prevPage()">❮</button><button class="nav-btn" onclick="nextPage()">❯</button></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        const params = new URLSearchParams(window.location.search);
        const categoryKey = params.get('cat') || '1_PetchPraUma';
        const categoryName = params.get('name') || 'คลังหนังสือ';
        
        let allBooksData = {}, currentSubFolder = null, isSearching = false;
        let pdfDoc = null, pageNum = 1, pageRendering = false, currentFileId = null;
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

        // --- โหลดข้อมูล ---
        async function loadBooks() {
            try {
                const response = await fetch("https://rung-sup.github.io/mybook/database.json");
                allBooksData = await response.json();
                renderMainView();
                displayMyShelf();
            } catch (e) { document.getElementById('book-list').innerHTML = 'ไม่พบฐานข้อมูล'; }
        }

        function renderMainView() {
            const listDiv = document.getElementById('book-list');
            const catData = allBooksData[categoryKey] || {};
            listDiv.innerHTML = '';
            isSearching = false;

            if (currentSubFolder === null) {
                document.getElementById('header-title').innerText = categoryName;
                document.getElementById('mainBackButton').onclick = () => location.href='categories.html';
                Object.keys(catData).forEach(folder => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    card.onclick = () => { currentSubFolder = folder; renderMainView(); };
                    card.innerHTML = `<img src="https://img.icons8.com/color/500/folder-invoices--v1.png" class="book-cover" style="object-fit:contain;padding:20px;"><div class="book-info"><div class="book-name">📂 ${folder}</div></div>`;
                    listDiv.appendChild(card);
                });
            } else {
                document.getElementById('header-title').innerText = currentSubFolder;
                document.getElementById('mainBackButton').onclick = () => { currentSubFolder = null; renderMainView(); };
                const files = catData[currentSubFolder] || [];
                files.sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
                files.forEach((name, i) => listDiv.appendChild(createBookCard({name, folder: currentSubFolder, id: (currentSubFolder+name).replace(/\s/g,'-')}, i)));
            }
        }

        // --- ระบบค้นหา ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) { renderMainView(); return; }
            
            isSearching = true;
            const catData = allBooksData[categoryKey] || {};
            const results = [];
            const keywords = term.split(' ').filter(k => k);

            Object.keys(catData).forEach(folder => {
                catData[folder].forEach(fileName => {
                    const text = (folder + fileName).toLowerCase();
                    if (keywords.every(kw => text.includes(kw))) {
                        results.push({name: fileName, folder: folder, id: (folder+fileName).replace(/\s/g,'-')});
                    }
                });
            });

            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = '';
            document.getElementById('header-title').innerText = `ค้นพบ ${results.length} รายการ`;
            results.forEach((file, i) => listDiv.appendChild(createBookCard(file, i, true)));
        });

        function createBookCard(file, index, showFolder = false) {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(file, file.folder);
            const hasBookmark = localStorage.getItem('bookmark-' + file.id);
            const imgId = `img-${index}-${Math.random().toString(36).substr(2,5)}`;
            card.innerHTML = `
                ${hasBookmark ? '<div class="bookmark-badge">อ่านค้างไว้</div>' : ''}
                <img id="${imgId}" src="https://via.placeholder.com/200x300?text=..." class="book-cover">
                <div class="book-info">
                    ${showFolder ? `<span class="folder-badge">📂 ${file.folder}</span>` : ''}
                    <div class="book-name">${file.name}</div>
                </div>`;
            generateThumb(file, imgId);
            return card;
        }

        async function generateThumb(file, imgId) {
            const url = `https://rung-sup.github.io/mybook/${categoryKey}/${encodeURIComponent(file.folder)}/${encodeURIComponent(file.name)}`;
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.2 });
                const tCanvas = document.createElement('canvas'), tCtx = tCanvas.getContext('2d');
                tCanvas.height = viewport.height; tCanvas.width = viewport.width;
                await page.render({ canvasContext: tCtx, viewport: viewport }).promise;
                document.getElementById(imgId).src = tCanvas.toDataURL();
            } catch(e) {}
        }

        // --- Reader ---
        async function openBook(file, folder) {
            currentFileId = file.id;
            const url = `https://rung-sup.github.io/mybook/${categoryKey}/${encodeURIComponent(folder)}/${encodeURIComponent(file.name)}`;
            document.getElementById('reader-overlay').style.display = 'flex';
            document.getElementById('book-title-display').innerText = file.name;
            
            // บันทึกรายการอ่านล่าสุด
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
            recent = [{...file, cat: categoryKey}, ...recent.filter(b => b.id !== file.id)].slice(0,6);
            localStorage.setItem('recent_books', JSON.stringify(recent));

            const pdf = await pdfjsLib.getDocument(url).promise;
            pdfDoc = pdf;
            pageNum = parseInt(localStorage.getItem('bookmark-'+currentFileId)) || 1;
            renderPDF(pageNum);
            document.getElementById('pdf-render-container').style.display = 'flex';
        }

        async function renderPDF(num) {
            pageRendering = true;
            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 1.5 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            pageRendering = false;
            document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
            localStorage.setItem('bookmark-' + currentFileId, num);
        }

        function prevPage() { if(pdfDoc && pageNum > 1) { pageNum--; renderPDF(pageNum); } }
        function nextPage() { if(pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; renderPDF(pageNum); } }
        function closeBook() { document.getElementById('reader-overlay').style.display = 'none'; pdfDoc = null; renderMainView(); displayMyShelf(); }

        function displayMyShelf() {
            const shelfDiv = document.getElementById('shelf-list'), shelfSection = document.getElementById('my-shelf');
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
            if (recent.length === 0) { shelfSection.style.display = 'none'; return; }
            shelfSection.style.display = 'block'; shelfDiv.innerHTML = '';
            recent.forEach((file, i) => {
                const card = createBookCard(file, i + 100, true);
                card.onclick = () => openBook(file, file.folder);
                shelfDiv.appendChild(card);
            });
        }

        loadBooks();
    </script>
</body>
</html>
