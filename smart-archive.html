<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือ Puk - My Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background: #f8fafc; color: #1e293b; padding: 20px; }
        
        .header-area { text-align: center; margin-bottom: 40px; }
        h1 { color: #0f172a; font-size: 28px; margin: 15px 0; font-weight: 600; }
        .back-btn { display: inline-block; color: #64748b; text-decoration: none; font-size: 14px; padding: 10px 20px; border-radius: 10px; background: #fff; border: 1px solid #e2e8f0; transition: 0.2s; }
        .back-btn:hover { background: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ดีไซน์การ์ด */
        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #d4af37; }

        /* ส่วนของปก */
        .cover-box {
            width: 100%;
            height: 240px;
            position: relative;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* กรณีมีรูปปก */
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* กรณีไม่มีรูปปก: พื้นขาวตัวหนังสือดำ */
        .no-cover {
            padding: 20px;
            text-align: center;
            color: #334155;
            font-weight: 600;
            font-size: 16px;
            line-height: 1.5;
            background: #fff;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f1f5f9;
        }

        /* ปกที่เป็นโฟลเดอร์ */
        .folder-box {
            background: #1e293b;
            color: #fff;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .folder-icon { font-size: 56px; margin-bottom: 10px; opacity: 0.9; }

        /* ข้อมูลใต้ปก */
        .info-box { padding: 16px; text-align: left; background: #fff; flex-grow: 1; }
        .title-text { 
            font-size: 15px; 
            font-weight: 500; 
            color: #0f172a; 
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            min-height: 2.8em;
        }
        
        .btn-view {
            display: block;
            background: #f8fafc;
            color: #475569;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .card:hover .btn-view { background: #d4af37; color: #fff; border-color: #d4af37; }

        #breadcrumb { margin-bottom: 30px; font-size: 15px; color: #64748b; display: none; }
        .crumb-link { color: #d4af37; cursor: pointer; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-area">
        <a href="categories.html" class="back-btn" id="btn-back">⬅ กลับหน้าหมวดหมู่หลัก</a>
        <h1 id="cat-title">กำลังค้นหา...</h1>
        <div id="breadcrumb">
            <span class="crumb-link" onclick="location.reload()">หมวดหมู่หลัก</span> / <span id="folder-name"></span>
        </div>
    </div>

    <div class="grid-container" id="main-grid"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const catKey = params.get('cat');
        const catName = params.get('name') || 'คลังหนังสือ';
        
        document.getElementById('cat-title').innerText = catName;
        
        let groupedData = { folders: {}, singles: [] };

        fetch('database.json')
            .then(res => res.json())
            .then(data => {
                const books = data.filter(b => b.url.includes(catKey));

                // จัดกลุ่มข้อมูล
                books.forEach(book => {
                    const parts = book.url.split(catKey + '/');
                    if (parts.length > 1) {
                        const pathNodes = parts[1].split('/');
                        if (pathNodes.length > 1) {
                            // เป็นโฟลเดอร์
                            const fName = decodeURIComponent(pathNodes[0]);
                            if (!groupedData.folders[fName]) groupedData.folders[fName] = [];
                            groupedData.folders[fName].push(book);
                        } else {
                            // เป็นเล่มเดี่ยว
                            groupedData.singles.push(book);
                        }
                    }
                });

                renderMainView();
            });

        function renderMainView() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            document.getElementById('breadcrumb').style.display = 'none';
            document.getElementById('btn-back').style.display = 'inline-block';

            // 1. แสดงโฟลเดอร์ก่อน
            Object.keys(groupedData.folders).forEach(fName => {
                const count = groupedData.folders[fName].length;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => renderFolderContent(fName);
                card.innerHTML = `
                    <div class="cover-box"><div class="folder-box"><div class="folder-icon">📁</div><div style="font-size:14px">${count} เล่ม</div></div></div>
                    <div class="info-box">
                        <div class="title-text">${fName}</div>
                        <div class="btn-view">เปิดชุดหนังสือ</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // 2. แสดงเล่มเดี่ยวต่อท้าย
            groupedData.singles.forEach(book => renderBookCard(book, grid));
        }

        function renderFolderContent(fName) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('folder-name').innerText = fName;

            groupedData.folders[fName].forEach(book => renderBookCard(book, grid));
        }

        function renderBookCard(book, container) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // ตรวจสอบรูปปก (สมมติว่าถ้ามีรูปปกจะเป็นไฟล์ชื่อเดียวกับ pdf แต่นามสกุล .jpg)
            // ถ้าคุณยังไม่มีระบบเจนรูปปก โค้ดจะแสดง No-Cover (พื้นขาวชื่อดำ) อัตโนมัติ
            const coverUrl = book.url.replace('.pdf', '.jpg'); 

            card.innerHTML = `
                <div class="cover-box">
                    <img src="${coverUrl}" class="cover-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="no-cover" style="display:none;">
                        <div>${book.title}</div>
                    </div>
                </div>
                <div class="info-box">
                    <div class="title-text" title="${book.title}">${book.title}</div>
                    <a href="${book.url}" class="btn-btn-view" target="_blank" style="text-decoration:none">
                        <div class="btn-view">📖 อ่านเล่มนี้</div>
                    </a>
                </div>
            `;
            card.onclick = (e) => {
                if(e.target.tagName !== 'A') window.open(book.url, '_blank');
            };
            container.appendChild(card);
        }
    </script>
</body>
</html>
