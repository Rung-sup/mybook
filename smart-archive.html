<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือคุณรันนรา - My Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; min-height: 100vh; overflow-x: hidden; }

        .header {
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-back-home {
            background: #333;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .my-shelf-section {
            background: rgba(212, 175, 55, 0.1);
            padding: 20px;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 10px;
            display: none;
        }

        .shelf-title {
            font-size: 16px;
            font-weight: 600;
            color: #3d2b1f;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .book-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
            border-bottom: 1px solid #eee;
        }

        .book-info {
            padding: 8px;
            text-align: center;
            flex-grow: 1;
        }

        .book-name {
            font-size: 11px;
            height: 32px;
            overflow: hidden;
            font-weight: 500;
            line-height: 1.4;
            color: #333;
        }

        .bookmark-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #d4af37;
            color: #fff;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 5px;
            z-index: 5;
        }

        #reader-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #222;
            z-index: 2000;
            flex-direction: column;
        }

        .reader-header {
            background: #111;
            color: #fff;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        #pdf-render-container {
            flex-grow: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            background: #333;
            padding: 10px;
        }

        #pdf-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #epub-viewer {
            width: 100%;
            height: 100%;
            background: #fff;
        }

        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 3000;
        }

        .nav-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: #d4af37;
            border: 2px solid #d4af37;
            pointer-events: auto;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        .error-box {
            grid-column: 1 / -1;
            background: #fff3f3;
            color: #a33;
            border: 1px solid #f1c0c0;
            padding: 14px 16px;
            border-radius: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button class="btn-back-home" onclick="location.href='categories.html'">⬅ กลับหน้าหมวดหมู่</button>
            <span id="header-title" style="color:#333;">คลังหนังสือ</span>
            <div style="width:40px;"></div>
        </div>
    </div>

    <div id="my-shelf" class="my-shelf-section">
        <div class="shelf-title">⭐ อ่านล่าสุด</div>
        <div id="shelf-list" class="shelf-grid"></div>
    </div>

    <div class="container" id="book-list">
        <p style="text-align:center; grid-column: 1/-1;">กำลังโหลดชั้นหนังสือ...</p>
    </div>

    <div id="reader-overlay">
        <div class="reader-header">
            <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:6px 15px; border-radius:5px; cursor:pointer;">ปิด</button>
            <span id="book-title-display" style="font-size:12px; color:#d4af37; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%;"></span>
            <span id="page-info" style="font-size:12px; color:#aaa;">หน้า 0/0</span>
        </div>

        <div id="pdf-render-container" style="display:none;">
            <canvas id="pdf-canvas"></canvas>
        </div>

        <div id="epub-viewer" style="display:none;">
            <div id="epub-render" style="width:100%; height:100%;"></div>
        </div>

        <div class="nav-controls" id="reader-nav-ui">
            <button class="nav-btn" onclick="prevPage()">❮</button>
            <button class="nav-btn" onclick="nextPage()">❯</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        const params = new URLSearchParams(window.location.search);
        const categoryKey = params.get('cat') || '1PetchPraUma';
        const categoryName = params.get('name') || 'คลังหนังสือ';

        document.getElementById('header-title').innerText = categoryName;

        let allBooks = [];
        let currentBook = null;
        let rendition = null;
        let currentFileId = null;
        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        function escapeHtml(text = '') {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getPlaceholderCover(title = 'No Cover') {
            const shortName = escapeHtml(String(title).substring(0, 20) || 'ไม่มีปก');
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
                    <rect width="200" height="300" fill="#2c3e50"/>
                    <rect x="12" y="12" width="176" height="276" rx="12" fill="#34495e" stroke="#d4af37" stroke-width="2"/>
                    <text x="100" y="130" text-anchor="middle" fill="#d4af37" font-size="14" font-family="Prompt, sans-serif">BOOK</text>
                    <foreignObject x="20" y="145" width="160" height="110">
                        <div xmlns="http://www.w3.org/1999/xhtml" style="
                            color:#ffffff;
                            font-family:Prompt,sans-serif;
                            font-size:15px;
                            line-height:1.35;
                            text-align:center;
                            word-break:break-word;
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            width:100%;
                            height:100%;
                            overflow:hidden;
                        ">${shortName}</div>
                    </foreignObject>
                </svg>
            `;
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        function normalizeGitHubUrl(url) {
            if (!url) return '';
            let fixed = String(url).trim();

            fixed = fixed.replace(/^httpsrung-sup\.github\.io/, 'https://rung-sup.github.io/');
            fixed = fixed.replace(/^https:\/\/rung-sup\.github\.io(?!\/)/, 'https://rung-sup.github.io/');
            fixed = fixed.replace(/^http:\/\/rung-sup\.github\.io(?!\/)/, 'https://rung-sup.github.io/');
            fixed = fixed.replace(/^https:\/(?!\/)/, 'https://');
            fixed = fixed.replace(/^http:\/(?!\/)/, 'http://');

            return fixed;
        }

        function buildBookUrl(file, cat) {
            if (file.url) {
                return normalizeGitHubUrl(file.url);
            }

            const path = file.folder ? encodeURIComponent(file.folder) + '/' : '';
            return `https://rung-sup.github.io/mybook/${cat}/${path}${encodeURIComponent(file.name)}`;
        }

        function isPdfFile(name = '') {
            return String(name).toLowerCase().endsWith('.pdf');
        }

        function isEpubFile(name = '') {
            return String(name).toLowerCase().endsWith('.epub');
        }

        function createBookObject(item, subFolder = '', fallbackCat = categoryKey) {
            if (typeof item === 'string') {
                return {
                    id: btoa(unescape(encodeURIComponent((subFolder || '') + item))),
                    name: item,
                    folder: subFolder,
                    url: '',
                    cat: fallbackCat,
                    mimeType: isEpubFile(item) ? 'application/epub+zip' : 'application/pdf'
                };
            }

            const name = item.name || item.title || item.filename || 'ไม่ทราบชื่อไฟล์';
            const url = normalizeGitHubUrl(item.url || '');
            const folder = item.folder || subFolder || '';
            const mimeType = item.mimeType || (isEpubFile(name) ? 'application/epub+zip' : 'application/pdf');

            return {
                id: btoa(unescape(encodeURIComponent((folder || '') + name + (url || '')))),
                name,
                folder,
                url,
                cat: fallbackCat,
                mimeType
            };
        }

        async function loadBooks() {
            try {
                const response = await fetch("https://rung-sup.github.io/mybook/database.json?v=" + new Date().getTime());
                const data = await response.json();
                const catData = data[categoryKey];

                allBooks = [];

                if (!catData) {
                    document.getElementById('book-list').innerHTML = `
                        <div class="error-box">
                            ไม่พบข้อมูลหนังสือในหมวดนี้<br>
                            หมวดที่ร้องขอ: ${escapeHtml(categoryKey)}
                        </div>
                    `;
                    return;
                }

                if (Array.isArray(catData)) {
                    catData.forEach(item => {
                        allBooks.push(createBookObject(item, '', categoryKey));
                    });
                } else if (typeof catData === 'object') {
                    Object.keys(catData).forEach(subFolder => {
                        const subItems = catData[subFolder];
                        if (Array.isArray(subItems)) {
                            subItems.forEach(item => {
                                allBooks.push(createBookObject(item, subFolder, categoryKey));
                            });
                        }
                    });
                }

                if (allBooks.length === 0) {
                    document.getElementById('book-list').innerHTML = `
                        <div class="error-box">
                            หมวดนี้ยังไม่มีหนังสือ หรือรูปแบบข้อมูลยังไม่ตรง
                        </div>
                    `;
                    return;
                }

                displayBooks(allBooks);
                displayMyShelf();
            } catch (e) {
                console.error("Load Error:", e);
                document.getElementById('book-list').innerHTML = `
                    <div class="error-box">
                        โหลดข้อมูลหนังสือไม่สำเร็จ กรุณาตรวจสอบ database.json หรือ GitHub Pages
                    </div>
                `;
            }
        }

        function displayBooks(books) {
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = '';

            books.forEach((file, index) => {
                const card = createBookCard(file, false, index);
                listDiv.appendChild(card);

                if (file.mimeType === 'application/pdf') {
                    generateThumbnail(file, categoryKey, `cover-${index}`);
                }
            });
        }

        function createBookCard(file, isShelf = false, index = 0) {
            const card = document.createElement('div');
            card.className = 'book-card';

            const cat = isShelf ? (file.cat || categoryKey) : categoryKey;
            card.onclick = () => openBook(file, cat);

            const hasBookmark = localStorage.getItem('bookmark-' + file.id);
            const imgId = isShelf ? `shelf-cover-${index}` : `cover-${index}`;

            card.innerHTML = `
                ${hasBookmark ? '<div class="bookmark-badge">อ่านค้างไว้</div>' : ''}
                <img id="${imgId}" src="${getPlaceholderCover(file.name)}" class="book-cover" alt="${escapeHtml(file.name)}">
                <div class="book-info">
                    <div class="book-name">${escapeHtml(file.name)}</div>
                </div>
            `;

            return card;
        }

        async function generateThumbnail(file, cat, imgId) {
            const img = document.getElementById(imgId);
            if (!img) return;

            const pdfUrl = buildBookUrl(file, cat);

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.2 });
                const thumbCanvas = document.createElement('canvas');
                const thumbCtx = thumbCanvas.getContext('2d');

                thumbCanvas.height = viewport.height;
                thumbCanvas.width = viewport.width;

                await page.render({
                    canvasContext: thumbCtx,
                    viewport: viewport
                }).promise;

                img.src = thumbCanvas.toDataURL();
                if (pdf.destroy) pdf.destroy();
            } catch (e) {
                console.warn("Thumb error for:", file.name, pdfUrl, e);
                img.src = getPlaceholderCover(file.name);
            }
        }

        async function renderPDFPage(num) {
            pageRendering = true;

            const page = await pdfDoc.getPage(num);
            const scale = 1.5;
            const viewport = page.getViewport({ scale: scale });

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderCtx = {
                canvasContext: ctx,
                viewport: viewport
            };

            await page.render(renderCtx).promise;
            pageRendering = false;

            if (pageNumPending !== null) {
                renderPDFPage(pageNumPending);
                pageNumPending = null;
            }

            document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
            localStorage.setItem('bookmark-' + currentFileId, num);
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPDFPage(num);
            }
        }

        async function openBook(file, cat) {
            try {
                addToRecent(file, cat);
                currentFileId = file.id;

                const isEpub = file.mimeType === 'application/epub+zip';
                const bookUrl = buildBookUrl(file, cat);

                document.getElementById('reader-overlay').style.display = 'flex';
                document.getElementById('book-title-display').innerText = file.name;
                document.getElementById('reader-nav-ui').style.display = 'flex';

                if (isEpub) {
                    document.getElementById('pdf-render-container').style.display = 'none';
                    document.getElementById('epub-viewer').style.display = 'block';

                    if (currentBook) currentBook.destroy();

                    currentBook = ePub(bookUrl);
                    rendition = currentBook.renderTo("epub-render", {
                        width: "100%",
                        height: "100%",
                        flow: "paginated"
                    });

                    const savedPos = localStorage.getItem('bookmark-' + currentFileId);
                    rendition.display(savedPos || undefined);

                    rendition.on("relocated", loc => {
                        localStorage.setItem('bookmark-' + currentFileId, loc.start.cfi);
                        document.getElementById('page-info').innerText = Math.floor(loc.start.percentage * 100) + "%";
                    });

                } else {
                    document.getElementById('epub-viewer').style.display = 'none';
                    document.getElementById('pdf-render-container').style.display = 'flex';
                    rendition = null;

                    const loadingTask = pdfjsLib.getDocument(bookUrl);
                    pdfDoc = await loadingTask.promise;

                    const savedPage = parseInt(localStorage.getItem('bookmark-' + currentFileId)) || 1;
                    pageNum = savedPage;
                    renderPDFPage(pageNum);
                }
            } catch (e) {
                console.error("Open book error:", e);
                alert("เปิดหนังสือไม่สำเร็จ\nกรุณาตรวจสอบ path ของไฟล์ หรือ URL ใน database.json");
                closeBook();
            }
        }

        function prevPage() {
            if (rendition) {
                rendition.prev();
            } else if (pdfDoc && pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
        }

        function nextPage() {
            if (rendition) {
                rendition.next();
            } else if (pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
        }

        function closeBook() {
            document.getElementById('reader-overlay').style.display = 'none';

            if (currentBook) {
                currentBook.destroy();
                currentBook = null;
            }

            pdfDoc = null;
            rendition = null;

            displayMyShelf();
            displayBooks(allBooks);
        }

        function addToRecent(file, cat) {
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
            recent = recent.filter(b => b.name !== file.name);
            recent.unshift({ ...file, cat: cat });

            if (recent.length > 6) recent.pop();
            localStorage.setItem('recent_books', JSON.stringify(recent));
        }

        function displayMyShelf() {
            const shelfDiv = document.getElementById('shelf-list');
            const shelfSection = document.getElementById('my-shelf');
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');

            if (recent.length === 0) {
                shelfSection.style.display = 'none';
                return;
            }

            shelfSection.style.display = 'block';
            shelfDiv.innerHTML = '';

            recent.forEach((file, index) => {
                const card = createBookCard(file, true, index);
                shelfDiv.appendChild(card);

                if (file.mimeType === 'application/pdf') {
                    generateThumbnail(file, file.cat || categoryKey, `shelf-cover-${index}`);
                }
            });
        }

        loadBooks();
    </script>
</body>
</html>
