<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หมวดหนังสือ - My Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #191714;
      --panel: #23201c;
      --text: #f7f0e3;
      --muted: #c9bba5;
      --accent: #d4af37;
      --border: rgba(212,175,55,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Prompt', sans-serif;
      background: radial-gradient(circle at top, #30271f 0%, var(--bg) 55%);
      color: var(--text);
      padding: 28px 16px 40px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      color: var(--accent);
      font-size: clamp(1.7rem, 1.2rem + 2vw, 2.3rem);
    }
    .sub {
      text-align: center;
      color: var(--muted);
      margin: 0 0 24px;
      font-size: 0.98rem;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .card {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      text-align: left;
      color: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(212,175,55,0.52); }
    .eyebrow { font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
    .name { font-size: 1.1rem; font-weight: 600; }
    .key { margin-top: 8px; color: #e8d9b5; font-size: 0.82rem; word-break: break-all; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>📚 หมวดหนังสือ</h1>
    <p class="sub">เวอร์ชันนี้ใช้ชื่อหมวดให้ตรงกับโฟลเดอร์จริงในฐานข้อมูลและ GitHub Pages</p>

    <div class="grid">
      <button class="card" onclick="go('1_PetchPraUma','เพชรพระอุมา')">
        <div class="eyebrow">หมวด 1</div>
        <div class="name">เพชรพระอุมา</div>
        <div class="key">cat=1_PetchPraUma</div>
      </button>

      <button class="card" onclick="go('2_Thai_Novel','นิยายไทย')">
        <div class="eyebrow">หมวด 2</div>
        <div class="name">นิยายไทย</div>
        <div class="key">cat=2_Thai_Novel</div>
      </button>

      <button class="card" onclick="go('3_English_Translated','นิยายแปล')">
        <div class="eyebrow">หมวด 3</div>
        <div class="name">นิยายแปล</div>
        <div class="key">cat=3_English_Translated</div>
      </button>

      <button class="card" onclick="go('4_Chinese_Novel','นิยายจีน')">
        <div class="eyebrow">หมวด 4</div>
        <div class="name">นิยายจีน</div>
        <div class="key">cat=4_Chinese_Novel</div>
      </button>

      <button class="card" onclick="go('5_HowTo_Religion','How-to / ศาสนา')">
        <div class="eyebrow">หมวด 5</div>
        <div class="name">How-to / ศาสนา</div>
        <div class="key">cat=5_HowTo_Religion</div>
      </button>

      <button class="card" onclick="go('6_HowTo_Religion_Science','How-to / ศาสนา / วิทยาศาสตร์')">
        <div class="eyebrow">หมวด 6</div>
        <div class="name">How-to / ศาสนา / วิทยาศาสตร์</div>
        <div class="key">cat=6_HowTo_Religion_Science</div>
      </button>
    </div>
  </main>

  <script>
    function go(catKey, name) {
      const url = `smart-archive.html?cat=${encodeURIComponent(catKey)}&name=${encodeURIComponent(name)}`;
      window.location.href = url;
    }
  </script>
</body>
</html>
