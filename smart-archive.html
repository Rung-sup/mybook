<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือคุณรันนรา - My Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; min-height: 100vh; }
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; background: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .btn-back-home { background: #333; border: 1px solid #d4af37; color: #d4af37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; position: relative; }
        .book-cover { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .book-info { padding: 8px; text-align: center; }
        .book-name { font-size: 11px; height: 32px; overflow: hidden; font-weight: 500; line-height: 1.4; color: #333; }
        #reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; }
        #pdf-canvas { max-width: 100%; height: auto; }
        .nav-controls { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; }
        .nav-btn { width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #d4af37; border: 2px solid #d4af37; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <button class="btn-back-home" onclick="location.href='categories.html'">⬅ กลับ</button>
            <span id="header-title" style="font-weight:600;">คลังหนังสือ</span>
            <div style="width:40px;"></div>
        </div>
    </div>
    <div class="container" id="book-list"></div>
    <div id="reader-overlay">
        <div style="background:#111; color:#fff; padding:10px; display:flex; justify-content:space-between;">
            <button onclick="closeBook()" style="background:#ff4d4d; color:#fff; border:none; padding:5px 15px; border-radius:5px;">ปิด</button>
            <span id="page-info">หน้า 0/0</span>
        </div>
        <div style="flex-grow:1; overflow:auto; display:flex; justify-content:center; background:#333;"><canvas id="pdf-canvas"></canvas></div>
        <div class="nav-controls"><button class="nav-btn" onclick="prevPage()">❮</button><button class="nav-btn" onclick="nextPage()">❯</button></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
        const params = new URLSearchParams(window.location.search);
        const categoryKey = params.get('cat') || '1_PetchPraUma';
        document.getElementById('header-title').innerText = params.get('name') || 'คลังหนังสือ';

        let allBooks = [], pdfDoc = null, pageNum = 1;
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

        async function loadData() {
            const response = await fetch("https://rung-sup.github.io/mybook/database.json");
            const data = await response.json();
            const catData = data[categoryKey] || [];
            
            allBooks = [];
            if (Array.isArray(catData)) {
                catData.forEach(name => allBooks.push({ name, folder: "" }));
            } else {
                // แก้จุดนี้: วนลูปดึงไฟล์จากทุกโฟลเดอร์ย่อยมาแสดงผล
                Object.keys(catData).forEach(folder => {
                    catData[folder].forEach(name => allBooks.push({ name, folder }));
                });
            }
            renderBooks();
        }

        function renderBooks() {
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = '';
            allBooks.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openBook(book);
                const imgId = `img-${index}`;
                card.innerHTML = `<img id="${imgId}" src="https://via.placeholder.com/200x300?text=..." class="book-cover"><div class="book-info"><div class="book-name">${book.name}</div></div>`;
                listDiv.appendChild(card);
                generateThumb(book, imgId);
            });
        }

        async function generateThumb(book, imgId) {
            const path = book.folder ? encodeURIComponent(book.folder) + '/' : '';
            const url = `https://rung-sup.github.io/mybook/${categoryKey}/${path}${encodeURIComponent(book.name)}`;
            try {
                const pdf = await pdfjsLib.getDocument(url).promise;
                const page = await pdf.getPage(1);
                const vp = page.getViewport({ scale: 0.2 });
                const tCanvas = document.createElement('canvas'), tCtx = tCanvas.getContext('2d');
                tCanvas.height = vp.height; tCanvas.width = vp.width;
                await page.render({ canvasContext: tCtx, viewport: vp }).promise;
                document.getElementById(imgId).src = tCanvas.toDataURL();
            } catch(e) {}
        }

        async function openBook(book) {
            const path = book.folder ? encodeURIComponent(book.folder) + '/' : '';
            const url = `https://rung-sup.github.io/mybook/${categoryKey}/${path}${encodeURIComponent(book.name)}`;
            document.getElementById('reader-overlay').style.display = 'flex';
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            pageNum = 1;
            renderPage(pageNum);
        }

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 1.5 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
        }

        function prevPage() { if(pageNum > 1) { pageNum--; renderPage(pageNum); } }
        function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
        function closeBook() { document.getElementById('reader-overlay').style.display = 'none'; pdfDoc = null; }

        loadData();
    </script>
</body>
</html>
