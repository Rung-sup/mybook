<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือ - My Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background: #1a1a1a; color: #fff; padding: 20px; }
        h1 { color: #d4af37; text-align: center; font-size: 24px; margin-bottom: 20px; }
        .back-btn { display: inline-block; color: #fff; text-decoration: none; margin-bottom: 20px; font-size: 14px; background: #444; padding: 5px 15px; border-radius: 5px; transition: 0.3s; }
        .back-btn:hover { background: #555; }
        
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* ปรับขนาดการ์ด */
            gap: 20px;
            margin-top: 20px;
        }

        .book-card {
            background: #262626;
            border-radius: 12px;
            overflow: hidden; /* เพื่อให้มุมโค้งตัดรูปภาพด้วย */
            border: 1px solid #333;
            transition: 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .book-card:hover { border-color: #d4af37; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(212, 175, 87, 0.2); }

        /* ส่วนของรูปปก */
        .book-cover {
            width: 100%;
            height: 190px; /* ความสูงของรูปปก */
            background-color: #333; /* สีพื้นหลังกรณีไม่มีรูป */
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #333;
        }

        .book-info { padding: 12px; text-align: left; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .book-title {
            font-size: 13px;
            color: #eee;
            margin: 0 0 12px 0;
            line-height: 1.4;
            font-weight: 400;
            /* ตัดคำถ้าชื่อยาวเกิน 3 บรรทัด */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 55px; /* ความสูงคงที่สำหรับชื่อ */
        }

        .read-btn {
            display: block;
            background: transparent;
            color: #d4af37;
            text-decoration: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            border: 1px solid #d4af37;
            transition: 0.3s;
        }
        
        .read-btn:hover { background: #d4af37; color: #1a1a1a; }
        
        #loader { text-align: center; margin-top: 50px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <a href="categories.html" class="back-btn">⬅ กลับหน้าหมวดหมู่</a>
    <h1 id="category-name">กำลังโหลด...</h1>

    <div id="loader">กำลังค้นหาหนังสือในคลัง...</div>
    <div class="book-grid" id="book-display"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const catKey = params.get('cat');
        const catName = params.get('name') || 'คลังหนังสือ';
        
        document.getElementById('category-name').innerText = catName;

        // ดึงข้อมูลจากสมุดบัญชี database.json
        fetch('database.json')
            .then(response => response.json())
            .then(data => {
                const loader = document.getElementById('loader');
                const display = document.getElementById('book-display');
                
                // กรองเฉพาะหนังสือที่อยู่ในหมวดที่เลือก
                const filteredBooks = data.filter(book => book.url.includes(catKey));

                loader.style.display = 'none';

                if (filteredBooks.length === 0) {
                    display.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">ยังไม่มีหนังสือในหมวดหมู่นี้</p>';
                    return;
                }

                filteredBooks.forEach(book => {
                    // กำหนดรูปปก: ถ้ามีไฟล์ .jpg ชื่อเดียวกับหนังสือในโฟลเดอร์เดียวกันให้เอามาโชว์ (ต้องทำเพิ่มในอนาคต)
                    // ตอนนี้ให้ใช้ default_cover.jpg ไปก่อนครับ
                    // ดึงลิงก์รูปปกออนไลน์มาใช้เลย (ไม่ต้องเซฟลงเครื่อง)
const defaultCovers = [
    'https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80', // สไตล์คลาสสิก อบอุ่น
    'https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80', // สไตล์มินิมอล ทันสมัย
    'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=400&q=80', // สไตล์เรียบหรู สว่างสบายตา
    'https://images.unsplash.com/photo-1629196914266-9dc730d19284?auto=format&fit=crop&w=400&q=80'  // สไตล์ลึกลับ แฟนตาซี
];

// สุ่มเลือกรูปปก 1 รูปมาแสดงผล
const randomIndex = Math.floor(Math.random() * defaultCovers.length);
const coverImageUrl = defaultCovers[randomIndex];

                    const card = document.createElement('div');
                    card.className = 'book-card';
                    card.innerHTML = `
                        <div class="book-cover" style="background-image: url('${coverImageUrl}');"></div>
                        
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <a href="${book.url}" class="read-btn" target="_blank">เปิดอ่าน</a>
                        </div>
                    `;
                    display.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('loader').innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                console.error(err);
            });
    </script>

</body>
</html>
