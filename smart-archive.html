<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือคุณรันนรา - My Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background-color: #f4f1ea; min-height: 100vh; overflow-x: hidden; }
        
        .header { padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; background: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .btn-back-home { background: #333; border: 1px solid #d4af37; color: #d4af37; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; }

        #breadcrumb { padding: 10px 20px; font-size: 14px; background: #fff; border-bottom: 1px solid #eee; display: none; }
        .crumb-link { color: #d4af37; cursor: pointer; font-weight: bold; text-decoration: underline; }

        .my-shelf-section { background: rgba(212, 175, 55, 0.1); padding: 20px; border-bottom: 2px solid #d4af37; margin-bottom: 10px; display: none; }
        .shelf-title { font-size: 16px; font-weight: 600; color: #3d2b1f; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        
        .book-card { background: #fff; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .book-cover { width: 100%; height: 180px; object-fit: cover; background: #eee; border-bottom: 1px solid #eee; }
        .book-info { padding: 8px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .book-name { font-size: 11px; height: 32px; overflow: hidden; font-weight: 500; line-height: 1.4; color: #333; }
        
        .bookmark-badge { position: absolute; top: 5px; right: 5px; background: #d4af37; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 5px; z-index: 5; }

        /* ระบบเปิดอ่าน (Reader) */
        #reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #222; z-index: 2000; flex-direction: column; }
        .reader-header { background: #111; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        #pdf-render-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; background: #333; padding: 10px; }
        #pdf-canvas { max-width: 100%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .nav-controls { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 3000; }
        .nav-btn { width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #d4af37; border: 2px solid #d4af37; pointer-events: auto; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <button class="btn-back-home" id="btn-back" onclick="location.href='categories.html'">⬅ กลับหน้าหมวดหมู่</button>
            <span id="header-title" style="color:#333; font-weight:600;">คลังหนังสือ</span>
            <div style="width:40px;"></div>
        </div>
        <div id="breadcrumb">
            <span class="crumb-link" onclick="renderMainView()">หมวดหมู่หลัก</span> > <span id="current-folder-name"></span>
        </div>
    </div>

    <div id="my-shelf" class="my-shelf-section">
        <div class="shelf-title">⭐ อ่านล่าสุด</div>
        <div id="shelf-list" class="shelf-grid"></div>
    </div>

    <div class="container" id="book-list">
        <p style="text-align:center; grid-column: 1/-1;">กำลังโหลดชั้นหนังสือ...</p>
    </div>

    <div id="reader-overlay">
        <div class="reader-header">
            <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:6px 15px; border-radius:5px; cursor:pointer;">ปิด</button>
            <span id="book-title-display" style="font-size:12px; color:#d4af37; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%;"></span>
            <span id="page-info" style="font-size:12px; color:#aaa;">หน้า 0/0</span>
        </div>
        <div id="pdf-render-container"><canvas id="pdf-canvas"></canvas></div>
        <div class="nav-controls">
            <button class="nav-btn" onclick="prevPage()">❮</button>
            <button class="nav-btn" onclick="nextPage()">❯</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        const params = new URLSearchParams(window.location.search);
        const categoryKey = params.get('cat');
        const categoryName = params.get('name') || 'คลังหนังสือ';
        document.getElementById('header-title').innerText = categoryName;

        let groupedData = { folders: {}, singles: [] };
        let pdfDoc = null, pageNum = 1, currentFileId = null;
        const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

        // โหลดข้อมูลจาก database.json ตัวใหม่
        async function loadBooks() {
            try {
                const response = await fetch("database.json");
                const data = await response.json();
                
                // กรองข้อมูลเฉพาะหมวดหมู่ที่เลือก
                const catBooks = data.filter(book => book.url.includes(categoryKey));

                // จัดกลุ่มเป็นโฟลเดอร์และเล่มเดี่ยว
                catBooks.forEach(book => {
                    const fileObj = {
                        id: encodeURIComponent(book.title).replace(/%/g, ''), // สร้าง ID ภาษาไทย
                        name: book.title,
                        url: book.url,
                        mimeType: 'application/pdf'
                    };

                    const parts = book.url.split(categoryKey + '/');
                    if (parts.length > 1) {
                        const subPath = parts[1].split('/');
                        if (subPath.length > 1) {
                            const folderName = decodeURIComponent(subPath[0]);
                            if (!groupedData.folders[folderName]) groupedData.folders[folderName] = [];
                            groupedData.folders[folderName].push(fileObj);
                        } else {
                            groupedData.singles.push(fileObj);
                        }
                    } else {
                        groupedData.singles.push(fileObj);
                    }
                });

                renderMainView();
                displayMyShelf();
            } catch (e) { 
                console.error(e);
                document.getElementById('book-list').innerHTML = '<p style="grid-column: 1/-1; text-align: center;">ไม่พบข้อมูลหนังสือ หรือเกิดข้อผิดพลาด</p>'; 
            }
        }

        // แสดงหน้าแรก (โฟลเดอร์ + เล่มเดี่ยว)
        function renderMainView() {
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = '';
            document.getElementById('breadcrumb').style.display = 'none';
            document.getElementById('btn-back').style.display = 'inline-block';

            // โชว์โฟลเดอร์
            Object.keys(groupedData.folders).forEach(folderName => {
                const count = groupedData.folders[folderName].length;
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => showBooksInFolder(folderName);
                card.innerHTML = `
                    <div style="width: 100%; height: 180px; background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #d4af37;">
                        <div style="font-size: 50px;">📁</div>
                        <div style="font-size: 13px; color: #fff; margin-top: 5px;">${count} เล่ม</div>
                    </div>
                    <div class="book-info"><div class="book-name" style="font-size:13px; font-weight:600;">${folderName}</div></div>
                `;
                listDiv.appendChild(card);
            });

            // โชว์เล่มเดี่ยว
            groupedData.singles.forEach((file, index) => {
                listDiv.appendChild(createBookCard(file, false, index));
                generateThumbnail(file, index, false);
            });
        }

        // แสดงหนังสือที่อยู่ในโฟลเดอร์
        function showBooksInFolder(folderName) {
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = '';
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('breadcrumb').style.display = 'block';
            document.getElementById('current-folder-name').innerText = folderName;

            groupedData.folders[folderName].forEach((file, index) => {
                listDiv.appendChild(createBookCard(file, false, index));
                // เจนรูปปกจาก PDF เฉพาะเล่มที่เปิดโฟลเดอร์ดู (ป้องกันเว็บค้าง)
                generateThumbnail(file, index, false);
            });
        }

        // สร้างการ์ดหนังสือ
        function createBookCard(file, isShelf = false, index = 0) {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(file);
            const hasBookmark = localStorage.getItem('bookmark-' + file.id);
            const imgId = isShelf ? `shelf-cover-${file.id}` : `cover-${index}`;
            
            card.innerHTML = `
                ${hasBookmark ? '<div class="bookmark-badge">อ่านค้างไว้</div>' : ''}
                <img id="${imgId}" src="https://via.placeholder.com/200x300?text=Loading..." class="book-cover">
                <div class="book-info"><div class="book-name">${file.name}</div></div>`;
            return card;
        }

        // ฟังก์ชันดึงรูปปกจาก PDF
        async function generateThumbnail(file, index, isShelf) {
            const imgId = isShelf ? `shelf-cover-${file.id}` : `cover-${index}`;
            try {
                const pdf = await pdfjsLib.getDocument(file.url).promise;
                const page = await pdf.getPage(1);
                const vp = page.getViewport({ scale: 0.3 });
                const tCanvas = document.createElement('canvas'), tCtx = tCanvas.getContext('2d');
                tCanvas.height = vp.height; tCanvas.width = vp.width;
                await page.render({ canvasContext: tCtx, viewport: vp }).promise;
                const img = document.getElementById(imgId);
                if(img) img.src = tCanvas.toDataURL();
            } catch (e) {
                const img = document.getElementById(imgId);
                if(img) img.src = "https://via.placeholder.com/200x300?text=No+Cover";
            }
        }

        // ฟังก์ชันเปิดหนังสืออ่าน
        async function openBook(file) {
            addToRecent(file);
            currentFileId = file.id;
            
            document.getElementById('reader-overlay').style.display = 'flex';
            document.getElementById('book-title-display').innerText = file.name;
            document.getElementById('page-info').innerText = `กำลังโหลด...`;
            
            try {
                const loadingTask = pdfjsLib.getDocument(file.url);
                pdfDoc = await loadingTask.promise;
                pageNum = parseInt(localStorage.getItem('bookmark-' + currentFileId)) || 1;
                renderPDFPage(pageNum);
            } catch (e) {
                document.getElementById('page-info').innerText = `เกิดข้อผิดพลาดในการเปิดไฟล์`;
            }
        }

        // ฟังก์ชันแสดงผลหน้า PDF
        async function renderPDFPage(num) {
            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 1.5 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            document.getElementById('page-info').innerText = `หน้า ${num} / ${pdfDoc.numPages}`;
            
            // บันทึกหน้าล่าสุด
            localStorage.setItem('bookmark-' + currentFileId, num);
        }

        function prevPage() { if (pdfDoc && pageNum > 1) { pageNum--; renderPDFPage(pageNum); } }
        function nextPage() { if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; renderPDFPage(pageNum); } }
        
        function closeBook() { 
            document.getElementById('reader-overlay').style.display = 'none'; 
            pdfDoc = null; 
            displayMyShelf(); // อัปเดตชั้นหนังสือก่อน
            // หาว่าตอนนี้อยู่ในโฟลเดอร์หรือหน้าหลัก เพื่อรีเฟรชหน้าถูก
            if(document.getElementById('breadcrumb').style.display === 'block') {
                showBooksInFolder(document.getElementById('current-folder-name').innerText);
            } else {
                renderMainView(); 
            }
        }

        // ระบบจัดเก็บอ่านล่าสุด
        function addToRecent(file) {
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
            recent = [ { ...file, cat: categoryKey }, ...recent.filter(b => b.id !== file.id) ].slice(0, 6);
            localStorage.setItem('recent_books', JSON.stringify(recent));
        }

        function displayMyShelf() {
            const shelfDiv = document.getElementById('shelf-list'), shelfSection = document.getElementById('my-shelf');
            let recent = JSON.parse(localStorage.getItem('recent_books') || '[]');
            // โชว์เฉพาะเล่มที่อยู่ในหมวดปัจจุบัน
            recent = recent.filter(b => b.cat === categoryKey);
            
            if (recent.length === 0) { shelfSection.style.display = 'none'; return; }
            shelfSection.style.display = 'block'; shelfDiv.innerHTML = '';
            
            recent.forEach((file, index) => {
                shelfDiv.appendChild(createBookCard(file, true, index));
                generateThumbnail(file, index, true);
            });
        }

        // เริ่มโหลดข้อมูล
        loadBooks();
    </script>
</body>
</html>
