<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังหนังสือ - My Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; background: #1a1a1a; color: #fff; padding: 20px; }
        h1 { color: #d4af37; text-align: center; font-size: 24px; }
        .back-btn { display: inline-block; color: #fff; text-decoration: none; margin-bottom: 20px; font-size: 14px; background: #444; padding: 5px 15px; border-radius: 5px; }
        
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .book-card {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .book-card:hover { border-color: #d4af37; transform: translateY(-3px); }

        .book-title {
            font-size: 14px;
            margin-bottom: 15px;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .read-btn {
            display: block;
            background: #d4af37;
            color: #1a1a1a;
            text-decoration: none;
            padding: 8px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 13px;
        }
        
        #loader { text-align: center; margin-top: 50px; color: #888; }
    </style>
</head>
<body>

    <a href="categories.html" class="back-btn">⬅ กลับหน้าหมวดหมู่</a>
    <h1 id="category-name">กำลังโหลด...</h1>

    <div id="loader">กำลังค้นหาหนังสือในคลัง...</div>
    <div class="book-grid" id="book-display"></div>

    <script>
        // 1. ดึงค่าจาก URL (เช่น ?cat=2_Thai_Novel)
        const params = new URLSearchParams(window.location.search);
        const catKey = params.get('cat');
        const catName = params.get('name') || 'คลังหนังสือ';
        
        document.getElementById('category-name').innerText = catName;

        // 2. ดึงข้อมูลจากสมุดบัญชี database.json
        fetch('database.json')
            .then(response => response.json())
            .then(data => {
                const loader = document.getElementById('loader');
                const display = document.getElementById('book-display');
                
                // กรองเฉพาะหนังสือที่อยู่ในหมวดที่เลือก
                const filteredBooks = data.filter(book => book.url.includes(catKey));

                loader.style.display = 'none';

                if (filteredBooks.length === 0) {
                    display.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">ยังไม่มีหนังสือในหมวดหมู่นี้</p>';
                    return;
                }

                filteredBooks.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    card.innerHTML = `
                        <div class="book-title">${book.title}</div>
                        <a href="${book.url}" class="read-btn" target="_blank">เปิดอ่าน</a>
                    `;
                    display.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('loader').innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                console.error(err);
            });
    </script>

</body>
</html>
